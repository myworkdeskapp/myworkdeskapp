<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JDesk — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Inter", "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
      background: #e8f5f0;
      -webkit-font-smoothing: antialiased;
    }

    a { color: #2e7d6b; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ===== FULL-PAGE LAYOUT ===== */
    .login-page {
      min-height: 100vh;
      position: relative;
      display: flex;
      overflow: hidden;
    }

    .login-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: 0;
    }

    /* ===== TOP LOGO BAR ===== */
    .top-logo {
      position: absolute;
      top: 28px;
      left: 36px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .logo-check {
      width: 34px;
      height: 34px;
      background: #2e7d6b;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-check svg {
      width: 18px;
      height: 18px;
      color: #fff;
    }

    .logo-name {
      font-size: 18px;
      font-weight: 800;
      color: #1a3d33;
      letter-spacing: 0.04em;
    }

    /* ===== MAIN CONTENT COLUMNS ===== */
    .login-columns {
      position: relative;
      z-index: 5;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 100px 56px 48px 56px;
      gap: 40px;
    }

    /* ===== LEFT COLUMN ===== */
    .left-col {
      flex: 1;
      max-width: 420px;
      display: flex;
      flex-direction: column;
    }

    .left-col h1 {
      font-size: 36px;
      font-weight: 400;
      color: #1a3d33;
      line-height: 1.25;
      margin-bottom: 10px;
    }

    .left-col h1 .hris-text {
      font-weight: 800;
      color: #2e7d6b;
    }

    .left-subtitle {
      font-size: 14px;
      color: #4a6860;
      margin-bottom: 36px;
    }

    .features-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 14px;
      font-weight: 500;
      color: #1a3d33;
    }

    .feature-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .feature-icon svg {
      width: 18px;
      height: 18px;
    }

    .fi-teal   { background: #d4ede8; color: #2e7d6b; }
    .fi-orange { background: #fdefd8; color: #c87a1a; }
    .fi-green  { background: #d6f0e0; color: #2a7a4b; }
    .fi-purple { background: #e9dff8; color: #6b42c8; }

    /* ===== RIGHT COLUMN: LOGIN CARD ===== */
    .right-col {
      flex-shrink: 0;
      width: 380px;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 36px 34px 28px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.10);
    }

    .card-title {
      font-size: 20px;
      font-weight: 400;
      color: #1a3d33;
      margin-bottom: 22px;
      line-height: 1.3;
    }

    .card-title strong {
      font-weight: 700;
    }

    .card-title-divider {
      width: 36px;
      height: 3px;
      background: #2e7d6b;
      border-radius: 2px;
      margin-bottom: 20px;
    }

    /* ===== FORM FIELDS ===== */
    .field-group {
      margin-bottom: 16px;
    }

    .field-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #1a3d33;
      margin-bottom: 6px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap input {
      width: 100%;
      padding: 11px 40px;
      border: 1.5px solid #d8e6e3;
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      color: #1a3d33;
      background: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-wrap input::placeholder {
      color: #9db5b0;
    }

    .input-wrap input:focus {
      border-color: #2e7d6b;
      box-shadow: 0 0 0 3px rgba(46, 125, 107, 0.12);
    }

    .input-wrap .field-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: #9db5b0;
      width: 16px;
      height: 16px;
      pointer-events: none;
    }

    .input-wrap .eye-toggle {
      position: absolute;
      right: 13px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #9db5b0;
      padding: 0;
      display: flex;
      align-items: center;
    }

    .input-wrap .eye-toggle svg {
      width: 16px;
      height: 16px;
    }

    /* ===== REMEMBER / FORGOT ROW ===== */
    .remember-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      font-size: 13px;
    }

    .remember-row label {
      display: flex;
      align-items: center;
      gap: 7px;
      color: #4a6860;
      cursor: pointer;
    }

    .remember-row label input[type="checkbox"] {
      accent-color: #2e7d6b;
      width: 14px;
      height: 14px;
    }

    .remember-row a {
      color: #4a6860;
      font-weight: 500;
    }

    /* ===== SIGN IN BUTTON ===== */
    .btn-signin {
      width: 100%;
      padding: 13px;
      background: #2e7d6b;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.2s, transform 0.1s;
      margin-bottom: 18px;
    }

    .btn-signin:hover {
      background: #25695a;
    }

    .btn-signin:active {
      transform: scale(0.98);
    }

    .btn-signin:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    /* ===== OR CONTINUE WITH ===== */
    .or-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: #7fa59d;
      margin-bottom: 14px;
    }

    .or-row::before, .or-row::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #d8e6e3;
    }

    /* ===== SOCIAL BUTTONS ===== */
    .social-row {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
    }

    .social-btn {
      flex: 1;
      padding: 10px 12px;
      border: 1.5px solid #d8e6e3;
      border-radius: 10px;
      background: #fff;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: #1a3d33;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s, border-color 0.2s;
    }

    .social-btn:hover {
      background: #f4faf8;
      border-color: #2e7d6b;
    }

    /* ===== CARD FOOTER ===== */
    .card-footer {
      text-align: center;
      font-size: 13px;
      color: #7fa59d;
      margin-bottom: 6px;
    }

    .card-footer a {
      color: #2e7d6b;
      font-weight: 600;
    }

    .card-copyright {
      text-align: center;
      font-size: 11px;
      color: #9db5b0;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #eaf2f0;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 900px) {
      .login-columns {
        flex-direction: column;
        align-items: flex-start;
        padding: 90px 28px 40px;
      }

      .left-col {
        max-width: 100%;
      }

      .right-col {
        width: 100%;
        max-width: 420px;
        align-self: center;
      }
    }

    @media (max-width: 480px) {
      .top-logo {
        left: 20px;
        top: 20px;
      }

      .login-columns {
        padding: 80px 20px 32px;
      }

      .left-col h1 {
        font-size: 28px;
      }

      .login-card {
        padding: 28px 22px 22px;
      }
    }
  </style>
</head>
<body>

  <div class="login-page">

    <!-- Full-page background -->
    <img
      class="login-bg"
      src="Baground theme login page .png"
      alt=""
      aria-hidden="true"
    />

    <!-- Top-left Logo -->
    <div class="top-logo">
      <div class="logo-check" aria-hidden="true">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 10l4.5 4.5L16 6" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="logo-name">JDESK</span>
    </div>

    <!-- Two-column content -->
    <div class="login-columns">

      <!-- ===== LEFT: WELCOME CONTENT ===== -->
      <div class="left-col">
        <h1>
          Welcome to<br />
          <span class="hris-text">HRIS</span> Portal
        </h1>
        <p class="left-subtitle">Manage Employees, Attendance, Payroll &amp; More</p>

        <ul class="features-list">
          <li class="feature-item">
            <span class="feature-icon fi-teal" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            Employee Management
          </li>
          <li class="feature-item">
            <span class="feature-icon fi-orange" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
              </svg>
            </span>
            Attendance Tracking
          </li>
          <li class="feature-item">
            <span class="feature-icon fi-green" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
                <line x1="9" y1="7" x2="15" y2="7"/>
                <line x1="9" y1="11" x2="15" y2="11"/>
                <line x1="9" y1="15" x2="12" y2="15"/>
              </svg>
            </span>
            Payroll &amp; Benefits
          </li>
          <li class="feature-item">
            <span class="feature-icon fi-purple" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 12V22H4V12"/>
                <path d="M22 7H2v5h20V7z"/>
                <path d="M12 22V7"/>
                <path d="M12 7H7.5a2.5 2.5 0 010-5C11 2 12 7 12 7z"/>
                <path d="M12 7h4.5a2.5 2.5 0 000-5C13 2 12 7 12 7z"/>
              </svg>
            </span>
            HR Ticketing
          </li>
        </ul>
      </div>

      <!-- ===== RIGHT: LOGIN CARD ===== -->
      <div class="right-col">
        <div class="login-card">

          <h2 class="card-title"><strong>Sign In</strong> to Your Account</h2>
          <div class="card-title-divider"></div>

          <!-- Login Form -->
          <form id="loginForm" novalidate>

            <div class="field-group">
              <label for="email">Email Address</label>
              <div class="input-wrap">
                <svg class="field-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                </svg>
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="Enter your email"
                  autocomplete="email"
                  required
                />
              </div>
            </div>

            <div class="field-group">
              <label for="password">Password</label>
              <div class="input-wrap">
                <svg class="field-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
                <input
                  type="password"
                  id="password"
                  name="password"
                  placeholder="Enter your password"
                  autocomplete="current-password"
                  required
                />
                <button type="button" class="eye-toggle" id="eyeToggle" aria-label="Toggle password visibility">
                  <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                  </svg>
                </button>
              </div>
            </div>

            <div class="remember-row">
              <label>
                <input type="checkbox" name="remember" />
                Remember me
              </label>
              <a href="#forgot">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-signin" id="loginBtn">
              Sign In
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <line x1="5" y1="12" x2="19" y2="12"/>
                <polyline points="12 5 19 12 12 19"/>
              </svg>
            </button>

          </form>

          <div class="or-row">Or continue with</div>

          <div class="social-row">
            <button class="social-btn" type="button" aria-label="Sign in with Google">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
              </svg>
              Google
            </button>
            <button class="social-btn" type="button" aria-label="Sign in with Microsoft">
              <svg width="16" height="16" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M11.4 2H2v9.4h9.4V2z" fill="#F25022"/>
                <path d="M22 2h-9.4v9.4H22V2z" fill="#7FBA00"/>
                <path d="M11.4 12.6H2V22h9.4v-9.4z" fill="#00A4EF"/>
                <path d="M22 12.6h-9.4V22H22v-9.4z" fill="#FFB900"/>
              </svg>
              Microsoft
            </button>
          </div>

          <div class="card-footer">
            Don't have an account?<br />
            <a href="#contact">Contact HR Team.</a>
          </div>

          <div class="card-copyright">© 2024 JDESK. All rights reserved.</div>

        </div>
      </div>
      <!-- end .right-col -->

    </div>
    <!-- end .login-columns -->

  </div>
  <!-- end .login-page -->

  <script>
    // Password visibility toggle
    document.getElementById('eyeToggle').addEventListener('click', function () {
      const pwd = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>';
      } else {
        pwd.type = 'password';
        icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
      }
    });

    // Login form handler
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        alert('Please fill in all fields.');
        return;
      }

      btn.textContent = 'Signing in…';
      btn.disabled = true;

      // Simulate auth — replace with real Cloudflare Worker API call
      setTimeout(() => {
        window.location.href = 'dashboard.html';
      }, 1200);
    });
  </script>

</body>
</html>
