<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
  <title>myWORKDESK | Super Admin Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <style>
    :root {
      --primary:       #5A8F7B;
      --primary-dark:  #497263;
      --primary-rgb:   90, 143, 123;
      --primary-soft:  #EBF4F1;
      --accent:        #F4C86A;
      --danger:        #E74C3C;
      --glass-border:  rgba(90, 143, 123, 0.22);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      color: #fff;
      background-color: #1a2e28;
      -webkit-font-smoothing: antialiased;
    }

    /* ======= COVER PHOTO BACKGROUND ======= */
    .bg-cover {
      position: fixed;
      inset: 0;
      z-index: -3;
      background-image: url('/assets/login-cover-happy.png');
      background-size: cover;
      background-position: center;
    }

    /* 10% transparent glass overlay */
    .bg-glass-overlay {
      position: fixed;
      inset: 0;
      z-index: -2;
      background: rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(2px) saturate(120%);
      -webkit-backdrop-filter: blur(2px) saturate(120%);
    }

    /* 3D depth vignette */
    .bg-vignette {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0, 0, 0, 0.22) 100%);
      pointer-events: none;
    }

    /* ======= TOP HEADER ======= */
    .top-header {
      position: relative;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 28px;
      height: 66px;
      flex-shrink: 0;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px) saturate(130%);
      -webkit-backdrop-filter: blur(12px) saturate(130%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
    }

    /* ── Logo image ─────── */
    .header-logo-img {
      height: 48px;
      width: auto;
      object-fit: contain;
      flex-shrink: 0;
      filter: brightness(1.15) saturate(1.1) drop-shadow(0 2px 10px rgba(0,0,0,0.30));
    }

    /* ── Super Admin badge ─────── */
    .sa-header-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(244, 200, 106, 0.18);
      border: 1px solid rgba(244, 200, 106, 0.45);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 10px;
      font-weight: 700;
      color: #F4C86A;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-left: 4px;
      flex-shrink: 0;
    }

    .sa-header-badge i { font-size: 9px; }

    /* ── Login form ─────── */
    .header-login-form {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    /* Each field group */
    .h-field {
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    /* Inner wrap: icon + input */
    .h-input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .h-input-wrap .h-icon {
      position: absolute;
      left: 10px;
      color: var(--primary-dark);
      font-size: 12px;
      pointer-events: none;
      z-index: 1;
    }

    .h-input-wrap input {
      height: 38px;
      width: 158px;
      padding: 0 12px 0 30px;
      border: 1px solid rgba(var(--primary-rgb), 0.40);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      font-size: 12.5px;
      color: #1a2e28;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.60), 0 2px 8px rgba(0,0,0,0.10);
    }

    .h-input-wrap input::placeholder { color: rgba(26, 46, 40, 0.45); }

    .h-input-wrap input:focus {
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.60), 0 0 0 3px rgba(var(--primary-rgb), 0.18);
    }

    .h-input-wrap input.is-invalid { border-color: var(--danger); }

    /* ── Password / Key eye toggle ─────── */
    .h-input-wrap input.pwd-input { padding-right: 32px; }

    .h-eye-toggle {
      position: absolute;
      right: 9px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--primary-dark);
      padding: 0;
      display: flex;
      align-items: center;
    }

    .h-eye-toggle svg { width: 14px; height: 14px; }

    /* ── Field error beneath input ─────── */
    .h-field-error {
      font-size: 11px;
      color: var(--danger);
      margin-top: 2px;
      display: none;
      white-space: nowrap;
      padding-left: 2px;
    }

    /* ── Sign In button ─────── */
    .btn-header-signin {
      height: 38px;
      padding: 0 18px;
      background: var(--primary);
      color: #fff;
      border: 1px solid var(--primary-dark);
      border-radius: 8px;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .btn-header-signin:hover {
      transform: translateY(-1px);
      background: var(--primary-dark);
      box-shadow: 0 6px 18px rgba(var(--primary-rgb), 0.40);
    }

    .btn-header-signin:active { transform: scale(0.97); }
    .btn-header-signin:disabled { opacity: 0.68; cursor: not-allowed; transform: none; }

    .btn-header-signin .h-spinner {
      display: none;
      width: 13px;
      height: 13px;
      border: 2px solid rgba(255, 255, 255, 0.38);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-header-signin.loading .h-spinner { display: block; }

    /* ── Header separator ─────── */
    .h-sep {
      font-size: 11px;
      font-weight: 800;
      opacity: 0.65;
      letter-spacing: 1px;
      white-space: nowrap;
      flex-shrink: 0;
      color: #1a2e28;
    }

    /* ======= MAIN HERO AREA ======= */
    .main-hero {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      padding-left: 5%;
      padding-right: 28px;
      padding-top: 48px;
      min-height: 0;
    }

    /* Hero content panel */
    .hero-content {
      max-width: 600px;
    }

    /* ── Super Admin badge in hero ─────── */
    .hero-sa-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(244, 200, 106, 0.15);
      border: 1px solid rgba(244, 200, 106, 0.40);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 11px;
      font-weight: 700;
      color: #F4C86A;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .hero-sa-badge i { font-size: 10px; }

    .hero-content h1 {
      font-size: clamp(44px, 6vw, 72px);
      font-weight: 800;
      line-height: 0.93;
      text-transform: uppercase;
      margin-bottom: 22px;
      color: #1a2e28;
      text-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }

    .hero-content h1 .accent {
      color: var(--primary-dark);
    }

    .hero-sub {
      font-size: clamp(14px, 1.5vw, 17px);
      color: #1a2e28;
      line-height: 1.6;
      margin-bottom: 30px;
      max-width: 480px;
      opacity: 0.85;
    }

    /* ── Motivational quote box ─────── */
    .hero-quote-box {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(14px) saturate(130%);
      -webkit-backdrop-filter: blur(14px) saturate(130%);
      border: 1px solid rgba(var(--primary-rgb), 0.25);
      border-left: 3px solid var(--primary);
      border-radius: 12px;
      padding: 16px 20px;
      max-width: 500px;
      box-shadow:
        0 4px 16px rgba(0, 0, 0, 0.10),
        inset 0 1px 0 rgba(255, 255, 255, 0.60);
    }

    .hero-quote-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--primary);
      margin-bottom: 8px;
    }

    .hero-quote-text {
      font-size: 13px;
      font-style: italic;
      color: #1a2e28;
      line-height: 1.6;
      margin-bottom: 7px;
    }

    .hero-quote-author {
      font-size: 11px;
      font-weight: 700;
      color: var(--primary-dark);
    }

    /* ======= TOAST ======= */
    .login-toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--primary);
      color: #fff;
      padding: 11px 22px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      z-index: 999;
      pointer-events: none;
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.35s;
      opacity: 0;
      white-space: nowrap;
    }

    .login-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .login-toast.error {
      background: #c0392b;
    }

    /* ======= RESPONSIVE ======= */

    /* Desktop: form overlays the header */
    @media (min-width: 641px) {
      body { position: relative; }

      .header-login-form {
        position: absolute;
        top: 14px;
        right: 28px;
        z-index: 25;
        justify-content: flex-end;
        flex-wrap: nowrap;
      }
    }

    @media (max-width: 1280px) and (min-width: 641px) {
      .h-input-wrap input { width: 138px; }
    }

    @media (max-width: 1100px) and (min-width: 641px) {
      .h-input-wrap input { width: 132px; }
    }

    @media (max-width: 860px) and (min-width: 641px) {
      .h-input-wrap input { width: 150px; }
      .main-hero { padding-right: 28px; }
      .hero-content h1 { font-size: 40px; }
    }

    /* Mobile: form shown below hero content */
    @media (max-width: 640px) {
      body {
        height: auto;
        min-height: 100vh;
        overflow-y: auto;
      }

      .top-header {
        height: 58px;
        padding: 0 20px;
      }

      .header-logo-img { height: 40px; }

      .main-hero {
        flex: none;
        justify-content: center;
        min-height: 55vh;
        padding-left: 20px;
        padding-right: 20px;
        padding-top: 12px;
        padding-bottom: 12px;
      }

      .hero-content h1 { font-size: 36px; }

      .header-login-form {
        flex-direction: column;
        align-items: stretch;
        width: 100%;
        gap: 10px;
        padding: 24px 20px 32px;
        background: rgba(0, 0, 0, 0.25);
        backdrop-filter: blur(20px) saturate(130%);
        -webkit-backdrop-filter: blur(20px) saturate(130%);
        border-top: 1px solid rgba(255, 255, 255, 0.15);
      }

      .h-field { flex: none; }

      .h-input-wrap input { width: 100%; }

      .btn-header-signin {
        width: 100%;
        justify-content: center;
        height: 42px;
        font-size: 13px;
      }
    }

  </style>
</head>
<body>

  <!-- Cover photo background layers -->
  <div class="bg-cover"></div>
  <div class="bg-glass-overlay"></div>
  <div class="bg-vignette"></div>

  <!-- ── TOP HEADER: Logo + SA badge ─────── -->
  <header class="top-header">
    <img class="header-logo-img" src="/assets/workdesk-logo.svg" alt="myWORKDESK" />
    <span class="sa-header-badge"><i class="fa-solid fa-shield-halved"></i> Super Admin</span>
  </header>

  <!-- ── MAIN HERO CONTENT ─────── -->
  <main class="main-hero" aria-label="Super Admin Portal">
    <div class="hero-content">

      <div class="hero-sa-badge">
        <i class="fa-solid fa-lock"></i> Restricted Access — Authorized Personnel Only
      </div>

      <h1>Admin<br><span class="accent">Control.</span></h1>

      <p class="hero-sub">
        Super administrator portal. Manage all organizations, users, roles, and platform-wide settings from this secure console.
      </p>

      <!-- Daily motivational quote -->
      <div class="hero-quote-box">
        <div class="hero-quote-label"><i class="fa-solid fa-quote-left"></i> Daily Motivation</div>
        <p class="hero-quote-text" id="quoteText"></p>
        <span class="hero-quote-author" id="quoteAuthor"></span>
      </div>
    </div>
  </main>

  <!-- ── SA LOGIN FORM (desktop: overlaid on header; mobile: below hero) ─────── -->
  <form class="header-login-form" id="saLoginForm" novalidate>

    <!-- Username -->
    <div class="h-field">
      <div class="h-input-wrap">
        <i class="fa-solid fa-user h-icon"></i>
        <input
          type="text"
          id="saUsername"
          name="username"
          placeholder="Username"
          autocomplete="off"
          required
        />
      </div>
      <span class="h-field-error" id="saUsernameError">Required</span>
    </div>

    <!-- Password -->
    <div class="h-field">
      <div class="h-input-wrap">
        <i class="fa-solid fa-lock h-icon"></i>
        <input
          type="password"
          id="saPassword"
          name="password"
          class="pwd-input"
          placeholder="Password"
          autocomplete="current-password"
          required
        />
        <button type="button" class="h-eye-toggle" id="eyeTogglePwd" aria-label="Toggle password visibility">
          <svg id="eyeIconPwd" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
          </svg>
        </button>
      </div>
      <span class="h-field-error" id="saPasswordError">Required</span>
    </div>

    <!-- Secret Key -->
    <div class="h-field">
      <div class="h-input-wrap">
        <i class="fa-solid fa-key h-icon"></i>
        <input
          type="password"
          id="saSecretKey"
          name="secretKey"
          class="pwd-input"
          placeholder="Secret Key"
          autocomplete="off"
          required
        />
        <button type="button" class="h-eye-toggle" id="eyeToggleKey" aria-label="Toggle secret key visibility">
          <svg id="eyeIconKey" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
          </svg>
        </button>
      </div>
      <span class="h-field-error" id="saSecretKeyError">Required</span>
    </div>

    <!-- Authenticate -->
    <button type="submit" class="btn-header-signin" id="loginBtn">
      <span class="btn-label">Sign In</span>
      <span class="h-spinner" aria-hidden="true"></span>
    </button>

  </form>

  <!-- Toast notification -->
  <div class="login-toast" id="loginToast" role="alert" aria-live="assertive"></div>

  <script>
    /* ── 30 daily-rotating motivational quotes ─────────────────────────────── */
    var QUOTES = [
      { text: 'Hard work beats talent when talent doesn\u2019t work hard.', author: 'Tim Notke' },
      { text: 'Success is not final, failure is not fatal: it is the courage to continue that counts.', author: 'Winston Churchill' },
      { text: 'The only way to do great work is to love what you do.', author: 'Steve Jobs' },
      { text: 'Don\u2019t watch the clock; do what it does. Keep going.', author: 'Sam Levenson' },
      { text: 'Success usually comes to those who are too busy to be looking for it.', author: 'Henry David Thoreau' },
      { text: 'Opportunities don\u2019t happen. You create them.', author: 'Chris Grosser' },
      { text: 'I find that the harder I work, the more luck I seem to have.', author: 'Thomas Jefferson' },
      { text: 'The secret of getting ahead is getting started.', author: 'Mark Twain' },
      { text: 'It always seems impossible until it\u2019s done.', author: 'Nelson Mandela' },
      { text: 'Don\u2019t limit your challenges. Challenge your limits.', author: 'Jerry Dunn' },
      { text: 'The way to get started is to quit talking and begin doing.', author: 'Walt Disney' },
      { text: 'Dream big, work hard, stay focused, and surround yourself with good people.', author: 'Unknown' },
      { text: 'Hustle until your haters ask if you\u2019re hiring.', author: 'Unknown' },
      { text: 'A dream doesn\u2019t become reality through magic; it takes sweat, determination, and hard work.', author: 'Colin Powell' },
      { text: 'Push yourself, because no one else is going to do it for you.', author: 'Unknown' },
      { text: 'Great things never come from comfort zones.', author: 'Unknown' },
      { text: 'Wake up with determination. Go to bed with satisfaction.', author: 'Unknown' },
      { text: 'The harder you work for something, the greater you\u2019ll feel when you achieve it.', author: 'Unknown' },
      { text: 'Build your dream, or someone else will hire you to build theirs.', author: 'Tony Gaskins' },
      { text: 'Success is not overnight. It\u2019s when every day you get a little better than the day before.', author: 'Dwayne Johnson' },
      { text: 'The only place where success comes before work is in the dictionary.', author: 'Vidal Sassoon' },
      { text: 'Do what you have to do until you can do what you want to do.', author: 'Oprah Winfrey' },
      { text: 'You don\u2019t have to be great to start, but you have to start to be great.', author: 'Zig Ziglar' },
      { text: 'Believe you can and you\u2019re halfway there.', author: 'Theodore Roosevelt' },
      { text: 'It does not matter how slowly you go as long as you do not stop.', author: 'Confucius' },
      { text: 'The difference between ordinary and extraordinary is that little extra.', author: 'Jimmy Johnson' },
      { text: 'Motivation is what gets you started. Habit is what keeps you going.', author: 'Jim Ryun' },
      { text: 'If you are not willing to risk the usual, you will have to settle for the ordinary.', author: 'Jim Rohn' },
      { text: 'The man who moves a mountain begins by carrying away small stones.', author: 'Confucius' },
      { text: 'Your time is limited, so don\u2019t waste it living someone else\u2019s life.', author: 'Steve Jobs' }
    ];

    /* Pick quote by day-of-year so it changes each calendar day */
    (function () {
      var now = new Date();
      var start = new Date(now.getFullYear(), 0, 0);
      var diff = now - start;
      var oneDay = 1000 * 60 * 60 * 24;
      var dayOfYear = Math.floor(diff / oneDay);
      var q = QUOTES[dayOfYear % QUOTES.length];
      document.getElementById('quoteText').textContent = '\u201c' + q.text + '\u201d';
      document.getElementById('quoteAuthor').textContent = '\u2014 ' + q.author;
    }());

    /* ── Toast helper ─────────────────────────────────────────────────────── */
    function showToast(msg, isError, duration) {
      var toast = document.getElementById('loginToast');
      toast.textContent = msg;
      toast.classList.toggle('error', !!isError);
      toast.classList.add('show');
      setTimeout(function () { toast.classList.remove('show'); }, duration || 3500);
    }

    /* ── Field error helpers ──────────────────────────────────────────────── */
    function setFieldError(inputId, errorId, message) {
      var input = document.getElementById(inputId);
      var err   = document.getElementById(errorId);
      if (!input || !err) return;
      if (message) {
        input.classList.add('is-invalid');
        err.textContent   = message;
        err.style.display = 'block';
      } else {
        input.classList.remove('is-invalid');
        err.style.display = 'none';
      }
    }

    function clearFieldErrors() {
      setFieldError('saUsername',  'saUsernameError',  null);
      setFieldError('saPassword',  'saPasswordError',  null);
      setFieldError('saSecretKey', 'saSecretKeyError', null);
    }

    ['saUsername', 'saPassword', 'saSecretKey'].forEach(function (id) {
      var el = document.getElementById(id);
      if (el) el.addEventListener('input', function () { setFieldError(id, id + 'Error', null); });
    });

    /* ── Eye toggle helper ────────────────────────────────────────────────── */
    function makeEyeToggle(btnId, inputId, iconId) {
      var btn = document.getElementById(btnId);
      if (!btn) return;
      btn.addEventListener('click', function () {
        var input = document.getElementById(inputId);
        var icon  = document.getElementById(iconId);
        if (input.type === 'password') {
          input.type = 'text';
          icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>';
        } else {
          input.type = 'password';
          icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
        }
      });
    }

    makeEyeToggle('eyeTogglePwd', 'saPassword',  'eyeIconPwd');
    makeEyeToggle('eyeToggleKey', 'saSecretKey', 'eyeIconKey');

    /* ── Rate limiting (client-side guard) ────────────────────────────────── */
    var failCount  = 0;
    var lockedUntil = 0;

    /* ── Form submission ──────────────────────────────────────────────────── */
    document.getElementById('saLoginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      clearFieldErrors();

      if (Date.now() < lockedUntil) {
        var secs = Math.ceil((lockedUntil - Date.now()) / 1000);
        showToast('Too many failed attempts. Try again in ' + secs + 's.', true);
        return;
      }

      var btn       = document.getElementById('loginBtn');
      var username  = document.getElementById('saUsername').value.trim();
      var password  = document.getElementById('saPassword').value;
      var secretKey = document.getElementById('saSecretKey').value;
      var valid     = true;

      if (!username)  { setFieldError('saUsername',  'saUsernameError',  'Required'); valid = false; }
      if (!password)  { setFieldError('saPassword',  'saPasswordError',  'Required'); valid = false; }
      if (!secretKey) { setFieldError('saSecretKey', 'saSecretKeyError', 'Required'); valid = false; }
      if (!valid) return;

      var btnLabel = btn.querySelector('.btn-label');
      if (btnLabel) btnLabel.textContent = 'Authenticating\u2026';
      btn.classList.add('loading');
      btn.disabled = true;

      fetch('/api/sa-auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: username, password: password, securityKey: secretKey })
      })
      .then(function (res) { return res.json().then(function (d) { return { status: res.status, data: d }; }); })
      .then(function (result) {
        if (result.data && result.data.ok) {
          failCount = 0;
          localStorage.setItem('sa_token', result.data.token);
          localStorage.setItem('sa_session', JSON.stringify({
            token:       result.data.token,
            username:    result.data.username,
            role:        'super_admin',
            permissions: ['*'],
            issuedAt:    Date.now()
          }));
          window.location.href = 'sa-dashboard.html';
        } else {
          failCount++;
          if (failCount >= 5) {
            lockedUntil = Date.now() + 60000;
            showToast('Too many failed attempts. Locked for 60 seconds.', true, 8000);
          } else {
            showToast(result.data && result.data.message ? result.data.message : 'Invalid credentials. Access denied.', true);
          }
          if (btnLabel) btnLabel.textContent = 'Sign In';
          btn.classList.remove('loading');
          btn.disabled = false;
        }
      })
      .catch(function () {
        showToast('Network error. Please try again.', true);
        if (btnLabel) btnLabel.textContent = 'Sign In';
        btn.classList.remove('loading');
        btn.disabled = false;
      });
    });
  </script>

</body>
</html>
