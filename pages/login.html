<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
  <title>myWORKDESK | Secure Enterprise Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <style>
    :root {
      --primary:       #5A8F7B;
      --primary-dark:  #497263;
      --primary-rgb:   90, 143, 123;
      --primary-soft:  #EBF4F1;
      --accent:        #F4C86A;
      --danger:        #E74C3C;
      --glass-border:  rgba(90, 143, 123, 0.22);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      color: #fff;
      background-color: #1a2e28;
      -webkit-font-smoothing: antialiased;
    }

    /* ======= COVER PHOTO BACKGROUND ======= */
    .bg-cover {
      position: fixed;
      inset: 0;
      z-index: -3;
      background-image: url('/assets/login-cover.png');
      background-size: cover;
      background-position: center;
    }

    /* 10% transparent glass overlay — slightly visible frosted layer */
    .bg-glass-overlay {
      position: fixed;
      inset: 0;
      z-index: -2;
      background: rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(2px) saturate(120%);
      -webkit-backdrop-filter: blur(2px) saturate(120%);
    }

    /* 3D depth vignette */
    .bg-vignette {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0, 0, 0, 0.22) 100%);
      pointer-events: none;
    }

    /* ======= TOP HEADER — logo only (form repositioned) ======= */
    .top-header {
      position: relative;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 28px;
      height: 66px;
      flex-shrink: 0;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px) saturate(130%);
      -webkit-backdrop-filter: blur(12px) saturate(130%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
    }

    /* ── Logo image ─────── */
    .header-logo-img {
      height: 48px;
      width: auto;
      object-fit: contain;
      flex-shrink: 0;
      filter: brightness(1.15) saturate(1.1) drop-shadow(0 2px 10px rgba(0,0,0,0.30));
    }

    /* ── Login form ─────── */
    .header-login-form {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    /* Each field group: wraps input + below-error */
    .h-field {
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    /* Inner wrap: holds icon + input (+ eye toggle for password) */
    .h-input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .h-input-wrap .h-icon {
      position: absolute;
      left: 10px;
      color: rgba(255, 255, 255, 0.75);
      font-size: 12px;
      pointer-events: none;
      z-index: 1;
    }

    .h-input-wrap input {
      height: 38px;
      width: 158px;
      padding: 0 12px 0 30px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      font-size: 12.5px;
      color: #fff;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.25), 0 2px 8px rgba(0,0,0,0.10);
    }

    .h-input-wrap input::placeholder { color: rgba(255, 255, 255, 0.60); }

    .h-input-wrap input:focus {
      border-color: rgba(255, 255, 255, 0.70);
      background: rgba(255, 255, 255, 0.26);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.30), 0 0 0 3px rgba(255,255,255,0.12);
    }

    .h-input-wrap input.is-invalid { border-color: var(--danger); }

    /* ── Password eye toggle ─────── */
    .h-input-wrap input.pwd-input { padding-right: 32px; }

    .h-eye-toggle {
      position: absolute;
      right: 9px;
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.65);
      padding: 0;
      display: flex;
      align-items: center;
    }

    .h-eye-toggle svg { width: 14px; height: 14px; }

    /* ── Field error beneath input ─────── */
    .h-field-error {
      font-size: 11px;
      color: #ffb3ae;
      margin-top: 2px;
      display: none;
      white-space: nowrap;
      padding-left: 2px;
    }

    /* ── Sign In button ─────── */
    .btn-header-signin {
      height: 38px;
      padding: 0 18px;
      background: var(--primary);
      color: #fff;
      border: 1px solid var(--primary-dark);
      border-radius: 8px;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .btn-header-signin:hover {
      transform: translateY(-1px);
      background: var(--primary-dark);
      box-shadow: 0 6px 18px rgba(var(--primary-rgb), 0.40);
    }

    .btn-header-signin:active { transform: scale(0.97); }
    .btn-header-signin:disabled { opacity: 0.68; cursor: not-allowed; transform: none; }

    .btn-header-signin .h-spinner {
      display: none;
      width: 13px;
      height: 13px;
      border: 2px solid rgba(255, 255, 255, 0.38);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-header-signin.loading .h-spinner { display: block; }

    /* ── Header separator ─────── */
    .h-sep {
      font-size: 11px;
      font-weight: 800;
      opacity: 0.65;
      letter-spacing: 1px;
      white-space: nowrap;
      flex-shrink: 0;
      color: rgba(255, 255, 255, 0.80);
    }

    /* ── SSO buttons in header ─────── */
    .h-sso-btns {
      display: flex;
      gap: 7px;
      flex-shrink: 0;
    }

    .h-sso-btn {
      height: 38px;
      padding: 0 13px;
      border: 1px solid rgba(255, 255, 255, 0.30);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      transition: background 0.2s, border-color 0.2s;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.20);
    }

    .h-sso-btn:hover { background: rgba(255, 255, 255, 0.25); border-color: rgba(255,255,255,0.55); }

    /* ── Aux links (forgot / sign up) ─────── */
    .h-aux-links {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
      flex-shrink: 0;
    }

    .h-aux-links a {
      color: rgba(255, 255, 255, 0.88);
      text-decoration: none;
      font-size: 10px;
      font-weight: 700;
      opacity: 0.90;
      transition: opacity 0.15s;
    }

    .h-aux-links a:hover { opacity: 1; text-decoration: underline; }

    /* ======= MAIN HERO AREA ======= */
    .main-hero {
      flex: 1;
      display: flex;
      align-items: center;
      padding-left: 28px;
      padding-right: 5%;
      min-height: 0;
    }

    /* 3D glass hero content panel */
    .hero-content {
      max-width: 600px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px) saturate(140%);
      -webkit-backdrop-filter: blur(20px) saturate(140%);
      border: 1px solid rgba(255, 255, 255, 0.20);
      border-radius: 20px;
      padding: 40px 44px;
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.28),
        inset 0 -1px 0 rgba(0, 0, 0, 0.08);
      transform-style: preserve-3d;
      animation: glassEntrance 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes glassEntrance {
      from { opacity: 0; transform: perspective(800px) translateY(20px) rotateX(2deg) scale(0.97); }
      to   { opacity: 1; transform: perspective(800px) translateY(0)    rotateX(0deg) scale(1); }
    }

    .hero-content h1 {
      font-size: clamp(44px, 6vw, 72px);
      font-weight: 800;
      line-height: 0.93;
      text-transform: uppercase;
      margin-bottom: 22px;
      color: #fff;
      text-shadow: 0 2px 16px rgba(0,0,0,0.30);
    }

    .animated-sub {
      font-size: clamp(15px, 1.8vw, 20px);
      color: rgba(255, 255, 255, 0.78);
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 38px;
    }

    .animated-sub .rotator-text {
      color: #a8d8c8;
      font-weight: 700;
      border-left: 2px solid #a8d8c8;
      padding-left: 12px;
    }

    .fade-cycle { animation: fadeCycle 4s infinite; }

    @keyframes fadeCycle {
      0%, 100% { opacity: 0; transform: translateY(5px); }
      10%, 90%  { opacity: 1; transform: translateY(0); }
    }

    /* ── Motivational quote box — 3D glass shard ─────── */
    .hero-quote-box {
      background: rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(14px) saturate(130%);
      -webkit-backdrop-filter: blur(14px) saturate(130%);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-left: 3px solid rgba(168, 216, 200, 0.80);
      border-radius: 12px;
      padding: 16px 20px;
      max-width: 500px;
      box-shadow:
        0 4px 16px rgba(0, 0, 0, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.18);
    }

    .hero-quote-text {
      font-size: 13px;
      font-style: italic;
      color: rgba(255, 255, 255, 0.85);
      line-height: 1.6;
      margin-bottom: 7px;
    }

    .hero-quote-author {
      font-size: 11px;
      font-weight: 700;
      color: #a8d8c8;
    }

    @keyframes qFadeIn  { from { opacity: 0; transform: translateY(6px);  } to { opacity: 1; transform: translateY(0); } }
    @keyframes qFadeOut { from { opacity: 1; transform: translateY(0);  } to { opacity: 0; transform: translateY(-6px); } }

    .hero-quote-text.fade-in  { animation: qFadeIn  0.5s ease forwards; }
    .hero-quote-text.fade-out { animation: qFadeOut 0.4s ease forwards; }

    /* ======= SECURITY FOOTER ======= */
    .security-footer {
      display: none;
    }

    .cert-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      opacity: 0.48;
      filter: grayscale(1);
      transition: opacity 0.2s, filter 0.2s;
      cursor: default;
    }

    .cert-badge:hover { opacity: 1; filter: grayscale(0); }
    .cert-badge i { font-size: 16px; color: var(--accent); }
    .cert-badge span { font-size: 11px; font-weight: 800; letter-spacing: 0.9px; text-transform: uppercase; }

    .footer-copyright {
      font-size: 11px;
      opacity: 0.55;
      letter-spacing: 0.3px;
    }

    /* ======= TOAST ======= */
    .login-toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--primary);
      color: #fff;
      padding: 11px 22px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      z-index: 999;
      pointer-events: none;
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.35s;
      opacity: 0;
      white-space: nowrap;
    }

    .login-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ======= RESPONSIVE ======= */

    /* Desktop: form overlays the header */
    @media (min-width: 641px) {
      body { position: relative; }

      .header-login-form {
        position: absolute;
        top: 14px;
        right: 28px;
        z-index: 25;
        justify-content: flex-end;
        flex-wrap: nowrap;
      }
    }

    @media (max-width: 1280px) and (min-width: 641px) {
      .h-input-wrap input { width: 138px; }
    }

    @media (max-width: 1100px) and (min-width: 641px) {
      .h-sso-btns, .h-sep, .h-aux-links { display: none; }
      .h-input-wrap input { width: 132px; }
    }

    @media (max-width: 860px) and (min-width: 641px) {
      .h-input-wrap input { width: 150px; }
      .main-hero { padding-left: 28px; }
      .hero-content h1 { font-size: 40px; }
    }

    /* Mobile: form shown below hero content */
    @media (max-width: 640px) {
      body {
        height: auto;
        min-height: 100vh;
        overflow-y: auto;
      }

      .top-header {
        height: 58px;
        padding: 0 20px;
      }

      .header-logo-img { height: 40px; }

      .main-hero {
        flex: none;
        min-height: 55vh;
        padding-left: 20px;
        padding-right: 20px;
        padding-top: 12px;
        padding-bottom: 12px;
      }

      .hero-content h1 { font-size: 36px; }

      .header-login-form {
        flex-direction: column;
        align-items: stretch;
        width: 100%;
        gap: 10px;
        padding: 24px 20px 32px;
        background: rgba(0, 0, 0, 0.25);
        backdrop-filter: blur(20px) saturate(130%);
        -webkit-backdrop-filter: blur(20px) saturate(130%);
        border-top: 1px solid rgba(255, 255, 255, 0.15);
      }

      .h-field { flex: none; }

      .h-input-wrap input {
        width: 100%;
      }

      .h-sso-btns {
        display: flex;
        flex-direction: row;
        gap: 8px;
      }

      .h-sso-btn { flex: 1; justify-content: center; }

      .h-sep { text-align: center; }

      .h-aux-links {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
      }

      .btn-header-signin {
        width: 100%;
        justify-content: center;
        height: 42px;
        font-size: 13px;
      }
    }

    /* ── Accessibility: respect reduced-motion preference ─────── */
    @media (prefers-reduced-motion: reduce) {
      .hero-content      { animation: none; }
      .fade-cycle        { animation: none; }
      .hero-quote-text   { animation: none !important; }
    }
  </style>
</head>
<body>

  <!-- Cover photo background layers -->
  <div class="bg-cover"></div>
  <div class="bg-glass-overlay"></div>
  <div class="bg-vignette"></div>

  <!-- ── TOP HEADER: Logo only ─────── -->
  <header class="top-header">
    <img class="header-logo-img" src="/assets/workdesk-logo.svg" alt="WorkDesk" />
  </header>

  <!-- ── MAIN HERO CONTENT ─────── -->
  <main class="main-hero" aria-label="Welcome">
    <div class="hero-content">
      <h1>Elevate Your<br>Workforce.</h1>

      <div class="animated-sub">
        Driven by
        <span id="textRotator" class="rotator-text fade-cycle">Performance Analytics</span>
      </div>

      <!-- Rotating motivational quote -->
      <div class="hero-quote-box">
        <p class="hero-quote-text" id="heroQuoteText"></p>
        <span class="hero-quote-author" id="heroQuoteAuthor"></span>
      </div>
    </div>
  </main>

  <!-- ── LOGIN FORM (desktop: overlaid on header; mobile: below hero) ─────── -->
  <form class="header-login-form" id="loginForm" novalidate>

    <!-- Organization ID -->
    <div class="h-field">
      <div class="h-input-wrap">
        <i class="fa-solid fa-building h-icon"></i>
        <input
          type="text"
          id="orgId"
          name="orgId"
          placeholder="Organization ID"
          autocomplete="off"
          required
        />
      </div>
      <span class="h-field-error" id="orgIdError">Required</span>
    </div>

    <!-- Employee ID -->
    <div class="h-field">
      <div class="h-input-wrap">
        <i class="fa-solid fa-user h-icon"></i>
        <input
          type="text"
          id="employeeId"
          name="employeeId"
          placeholder="Employee ID"
          autocomplete="username"
          required
        />
      </div>
      <span class="h-field-error" id="employeeIdError">Required</span>
    </div>

    <!-- Password -->
    <div class="h-field">
      <div class="h-input-wrap">
        <i class="fa-solid fa-lock h-icon"></i>
        <input
          type="password"
          id="password"
          name="password"
          class="pwd-input"
          placeholder="Password"
          autocomplete="current-password"
          required
        />
        <button type="button" class="h-eye-toggle" id="eyeToggle" aria-label="Toggle password visibility">
          <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
          </svg>
        </button>
      </div>
      <span class="h-field-error" id="passwordError">Required</span>
    </div>

    <!-- Sign In -->
    <button type="submit" class="btn-header-signin" id="loginBtn">
      <span class="btn-label">Sign In</span>
      <span class="h-spinner" aria-hidden="true"></span>
    </button>

    <!-- SSO divider + buttons -->
    <span class="h-sep">OR</span>

    <div class="h-sso-btns">
      <button class="h-sso-btn" type="button" id="googleBtn" aria-label="Sign in with Google">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Google
      </button>
      <button class="h-sso-btn" type="button" id="msBtn" aria-label="Sign in with Microsoft">
        <svg width="13" height="13" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M11.4 2H2v9.4h9.4V2z" fill="#F25022"/>
          <path d="M22 2h-9.4v9.4H22V2z" fill="#7FBA00"/>
          <path d="M11.4 12.6H2V22h9.4v-9.4z" fill="#00A4EF"/>
          <path d="M22 12.6h-9.4V22H22v-9.4z" fill="#FFB900"/>
        </svg>
        Microsoft
      </button>
    </div>

    <!-- Aux links -->
    <div class="h-aux-links">
      <a href="#forgot" id="forgotLink">Forgot Password?</a>
      <a href="#signup" id="orgSignupLink">Sign Up</a>
    </div>

  </form>

  <!-- ── SECURITY CERTIFICATIONS FOOTER (hidden) ─────── -->
  <footer class="security-footer">
    <div class="cert-badge">
      <i class="fa-solid fa-shield-halved"></i>
      <span>ISO 27001 Certified</span>
    </div>
    <div class="cert-badge">
      <i class="fa-solid fa-lock"></i>
      <span>SOC 2 Type II</span>
    </div>
    <div class="cert-badge">
      <i class="fa-solid fa-earth-americas"></i>
      <span>GDPR Compliant</span>
    </div>
    <div class="cert-badge">
      <i class="fa-solid fa-user-shield"></i>
      <span>AES-256 Encrypted</span>
    </div>
    <div class="cert-badge">
      <i class="fa-solid fa-fingerprint"></i>
      <span>2FA Secured</span>
    </div>
    <span class="footer-copyright">© <span id="copyrightYear"></span> WorkDesk. All rights reserved.</span>
  </footer>

  <!-- Toast notification -->
  <div class="login-toast" id="loginToast" role="status" aria-live="polite"></div>

  <script>
    // ── Dynamic copyright year ────────────────────────────────────────────────
    document.getElementById('copyrightYear').textContent = new Date().getFullYear();

    // ── Role text rotator ─────────────────────────────────────────────────────
    var roles = ['Performance Analytics', 'Global Recruitment', 'Real-time Attendance', 'Integrated Payroll', 'Strategic Reporting'];
    var roleIndex = 0;
    var rotatorEl = document.getElementById('textRotator');

    setInterval(function () {
      roleIndex = (roleIndex + 1) % roles.length;
      rotatorEl.classList.remove('fade-cycle');
      void rotatorEl.offsetWidth; // force reflow so CSS animation restarts
      rotatorEl.textContent = roles[roleIndex];
      rotatorEl.classList.add('fade-cycle');
    }, 4000);

    // ── Motivational quotes (rotate every 20 min, synced to clock) ────────────
    var QUOTES = [
      { text: 'The only way to do great work is to love what you do.',                               author: 'Steve Jobs'          },
      { text: 'Success is not the key to happiness. Happiness is the key to success.',               author: 'Albert Schweitzer'   },
      { text: 'Believe you can and you\u2019re halfway there.',                                       author: 'Theodore Roosevelt'  },
      { text: 'Hard work beats talent when talent doesn\u2019t work hard.',                          author: 'Tim Notke'           },
      { text: 'The future depends on what you do today.',                                             author: 'Mahatma Gandhi'      },
      { text: 'Don\u2019t watch the clock; do what it does. Keep going.',                            author: 'Sam Levenson'        },
      { text: 'Coming together is a beginning, staying together is progress, and working together is success.', author: 'Henry Ford' },
      { text: 'Excellence is not a destination but a continuous journey that never ends.',            author: 'Brian Tracy'         },
      { text: 'Teamwork makes the dream work.',                                                       author: 'John C. Maxwell'     },
      { text: 'Your attitude, not your aptitude, will determine your altitude.',                     author: 'Zig Ziglar'          }
    ];

    var QUOTE_INTERVAL_MS = 20 * 60 * 1000;
    var quoteIndex = Math.floor(Date.now() / QUOTE_INTERVAL_MS) % QUOTES.length;

    function renderHeroQuote(idx, animated) {
      var textEl   = document.getElementById('heroQuoteText');
      var authorEl = document.getElementById('heroQuoteAuthor');
      if (!textEl) return;
      var q = QUOTES[idx];
      if (!animated) {
        textEl.textContent   = '\u201C' + q.text + '\u201D';
        authorEl.textContent = '\u2014 ' + q.author;
        return;
      }
      textEl.classList.remove('fade-in');
      textEl.classList.add('fade-out');
      setTimeout(function () {
        textEl.textContent   = '\u201C' + q.text + '\u201D';
        authorEl.textContent = '\u2014 ' + q.author;
        textEl.classList.remove('fade-out');
        textEl.classList.add('fade-in');
        setTimeout(function () { textEl.classList.remove('fade-in'); }, 600);
      }, 400);
    }

    renderHeroQuote(quoteIndex, false);

    var msUntilNextSlot = QUOTE_INTERVAL_MS - (Date.now() % QUOTE_INTERVAL_MS);
    setTimeout(function () {
      quoteIndex = (quoteIndex + 1) % QUOTES.length;
      renderHeroQuote(quoteIndex, true);
      setInterval(function () {
        quoteIndex = (quoteIndex + 1) % QUOTES.length;
        renderHeroQuote(quoteIndex, true);
      }, QUOTE_INTERVAL_MS);
    }, msUntilNextSlot);

    // ── Toast helper ─────────────────────────────────────────────────────────
    function showToast(msg, duration) {
      var toast = document.getElementById('loginToast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(function () { toast.classList.remove('show'); }, duration || 3000);
    }

    // ── Field error helpers ───────────────────────────────────────────────────
    function setFieldError(inputId, errorId, message) {
      var input = document.getElementById(inputId);
      var err   = document.getElementById(errorId);
      if (!input || !err) return;
      if (message) {
        input.classList.add('is-invalid');
        err.textContent   = message;
        err.style.display = 'block';
      } else {
        input.classList.remove('is-invalid');
        err.style.display = 'none';
      }
    }

    function clearFieldErrors() {
      setFieldError('orgId',      'orgIdError',      null);
      setFieldError('employeeId', 'employeeIdError', null);
      setFieldError('password',   'passwordError',   null);
    }

    document.getElementById('orgId').addEventListener('input', function () {
      setFieldError('orgId', 'orgIdError', null);
    });
    document.getElementById('employeeId').addEventListener('input', function () {
      setFieldError('employeeId', 'employeeIdError', null);
    });
    document.getElementById('password').addEventListener('input', function () {
      setFieldError('password', 'passwordError', null);
    });

    // ── Password visibility toggle ────────────────────────────────────────────
    document.getElementById('eyeToggle').addEventListener('click', function () {
      var pwd  = document.getElementById('password');
      var icon = document.getElementById('eyeIcon');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>';
      } else {
        pwd.type = 'password';
        icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
      }
    });

    // ── Forgot password ───────────────────────────────────────────────────────
    document.getElementById('forgotLink').addEventListener('click', function (e) {
      e.preventDefault();
      var empId = document.getElementById('employeeId').value.trim();
      if (!empId) {
        setFieldError('employeeId', 'employeeIdError', 'Enter Employee ID first.');
        return;
      }
      showToast('Password reset request submitted for Employee ID: ' + empId + '. Contact your HR Team.');
    });

    // ── Social SSO buttons ────────────────────────────────────────────────────
    document.getElementById('googleBtn').addEventListener('click', function () {
      showToast('Google SSO is configured via your Cloudflare Access policy.');
    });
    document.getElementById('msBtn').addEventListener('click', function () {
      showToast('Microsoft SSO is configured via your Cloudflare Access policy.');
    });

    // ── Organization sign-up link ─────────────────────────────────────────────
    document.getElementById('orgSignupLink').addEventListener('click', function (e) {
      e.preventDefault();
      showToast('Organization registration is coming soon. Contact the WorkDesk team to get started.');
    });

    // ── Login form submit ─────────────────────────────────────────────────────
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      clearFieldErrors();

      var btn        = document.getElementById('loginBtn');
      var orgId      = document.getElementById('orgId').value.trim();
      var employeeId = document.getElementById('employeeId').value.trim();
      var password   = document.getElementById('password').value;
      var valid      = true;

      if (!orgId)      { setFieldError('orgId',      'orgIdError',      'Required'); valid = false; }
      if (!employeeId) { setFieldError('employeeId', 'employeeIdError', 'Required'); valid = false; }
      if (!password)   { setFieldError('password',   'passwordError',   'Required'); valid = false; }
      if (!valid) return;

      // Persist display name derived from employee ID
      var nameParts   = employeeId.split(/[._-]/).filter(function (w) { return w.length > 0; });
      var displayName = nameParts.length > 0
        ? nameParts.map(function (w) { return w.charAt(0).toUpperCase() + w.slice(1).toLowerCase(); }).join(' ')
        : 'Employee ' + employeeId;
      localStorage.setItem('workdesk_display_name', displayName);

      var btnLabel = btn.querySelector('.btn-label');
      if (btnLabel) btnLabel.textContent = 'Signing in\u2026';
      btn.classList.add('loading');
      btn.disabled = true;

      fetch('/api/auth', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ orgId: orgId, employeeId: employeeId, password: password })
      })
      .then(function (res) { return res.json(); })
      .then(function (data) {
        if (data && data.ok) {
          if (data.token) localStorage.setItem('workdesk_token', data.token);
          window.location.href = 'dashboard.html';
        } else {
          showToast(data && data.message ? data.message : 'Invalid credentials. Please try again.');
          if (btnLabel) btnLabel.textContent = 'Sign In';
          btn.classList.remove('loading');
          btn.disabled = false;
        }
      })
      .catch(function () {
        showToast('Login failed. Please check your connection and try again.');
        if (btnLabel) btnLabel.textContent = 'Sign In';
        btn.classList.remove('loading');
        btn.disabled = false;
      });
    });
  </script>

</body>
</html>
