<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <!-- Background circle -->
  <circle cx="40" cy="40" r="40" fill="#E6F7F0"/>
  <!-- Border ring -->
  <circle cx="40" cy="40" r="39" fill="none" stroke="#276749" stroke-width="2" stroke-opacity="0.3"/>
  <!-- Body silhouette -->
  <circle cx="40" cy="30" r="14" fill="#276749" opacity="0.85"/>
  <ellipse cx="40" cy="68" rx="22" ry="16" fill="#276749" opacity="0.7"/>
  <!-- Initials overlay -->
  <text x="40" y="35" text-anchor="middle" dominant-baseline="central"
        font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700"
        fill="#ffffff" letter-spacing="1">CR</text>
  <!-- Employee ID label -->
  <rect x="10" y="58" width="60" height="16" rx="8" fill="#276749" opacity="0.9"/>
  <text x="40" y="67" text-anchor="middle" dominant-baseline="central"
        font-family="Inter, Arial, sans-serif" font-size="9" font-weight="600"
        fill="#ffffff" letter-spacing="0.5">EMP-006</text>
</svg>