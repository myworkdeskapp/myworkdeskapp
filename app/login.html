<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
  <link rel="icon" href="https://res.cloudinary.com/dkqr6pxfr/image/upload/workdesk-logo.png.png" type="image/png" />
  <title>myWORKDESK | Secure Enterprise Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --primary:      #5A8F7B;
      --primary-dark: #497263;
      --primary-rgb:  90, 143, 123;
      --accent:       #F4C86A;
      --accent-dark:  #E6B84E;
      --danger:       #E74C3C;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #E8E4DE 0%, #CEC9C1 100%);
      -webkit-font-smoothing: antialiased;
      padding: 24px 16px;
    }

    /* ======= OUTER CARD ======= */
    .login-card {
      width: 940px;
      max-width: 100%;
      min-height: 600px;
      background: rgba(255, 255, 255, 0.22);
      border-radius: 24px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      display: flex;
      overflow: hidden;
    }

    /* ======= LEFT: FORM PANEL ======= */
    .form-panel {
      flex: 0 0 42%;
      display: flex;
      flex-direction: column;
      padding: 44px 48px 36px;
      background: rgba(255, 255, 255, 0.68);
    }

    /* ── Logo ─────── */
    .logo-pill {
      display: inline-block;
      align-self: flex-start;
      margin-bottom: 36px;
      text-decoration: none;
    }

    .logo-pill img {
      height: 42px;
      width: auto;
      display: block;
    }

    /* ── Heading ─────── */
    .form-heading {
      font-size: 30px;
      font-weight: 700;
      color: #111827;
      line-height: 1.18;
      margin-bottom: 8px;
    }

    .form-sub {
      font-size: 13.5px;
      color: #9CA3AF;
      margin-bottom: 30px;
      line-height: 1.4;
    }

    /* ── Field groups ─────── */
    .field-group {
      margin-bottom: 18px;
    }

    .field-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #6B7280;
      margin-bottom: 7px;
    }

    .field-input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .field-input {
      width: 100%;
      height: 50px;
      padding: 0 16px;
      border: 1px solid #E5E7EB;
      border-radius: 14px;
      background: #FAFAFA;
      font-family: inherit;
      font-size: 14px;
      color: #111827;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .field-input::placeholder { color: #C4C4C4; }

    .field-input:focus {
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(var(--primary-rgb), 0.12);
    }

    .field-input.is-invalid { border-color: var(--danger); }

    /* ── Password eye toggle ─────── */
    .field-input.pwd-input { padding-right: 44px; }

    .pwd-eye {
      position: absolute;
      right: 13px;
      background: none;
      border: none;
      cursor: pointer;
      color: #9CA3AF;
      padding: 0;
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }

    .pwd-eye:hover { color: var(--primary-dark); }

    /* ── Field error ─────── */
    .field-error {
      font-size: 11px;
      color: var(--danger);
      margin-top: 5px;
      display: none;
      padding-left: 2px;
    }

    /* ── Submit button ─────── */
    .btn-submit {
      width: 100%;
      height: 52px;
      background: var(--accent);
      border: none;
      border-radius: 14px;
      color: #1a2e28;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
    }

    .btn-submit:hover {
      background: var(--accent-dark);
      box-shadow: 0 8px 22px rgba(230, 184, 78, 0.40);
      transform: translateY(-1px);
    }

    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.68; cursor: not-allowed; transform: none; }

    .h-spinner {
      display: none;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(26, 46, 40, 0.28);
      border-top-color: #1a2e28;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-submit.loading .h-spinner { display: block; }

    /* ── Bottom links row ─────── */
    .bottom-links {
      margin-top: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12.5px;
      color: #9CA3AF;
    }

    .bottom-links a {
      color: var(--primary-dark);
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s;
    }

    .bottom-links a:hover { text-decoration: underline; }

    #saToggleLink { color: #6B7280; font-weight: 500; font-size: 12px; }
    #saToggleLink:hover { color: var(--primary-dark); }

    /* ======= RIGHT: IMAGE PANEL ======= */
    .image-panel {
      flex: 1;
      position: relative;
      overflow: hidden;
      border-radius: 0 20px 20px 0;
    }

    .image-panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(1.5px) saturate(120%);
      -webkit-backdrop-filter: blur(1.5px) saturate(120%);
      pointer-events: none;
    }

    .panel-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0.85;
    }

    /* ── Calendar strip (lower area of image) ─────── */
    .float-card-cal {
      position: absolute;
      bottom: 36px;
      right: 20px;
      transform: none;
      background: rgba(255, 255, 255, 0.18);
      border-radius: 14px;
      padding: 12px 16px;
      backdrop-filter: blur(12px) saturate(140%);
      -webkit-backdrop-filter: blur(12px) saturate(140%);
      border: 1px solid rgba(255, 255, 255, 0.30);
    }

    .fc-cal-days {
      display: flex;
      gap: 6px;
    }

    .fc-cal-day {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      min-width: 28px;
    }

    .fc-cal-label {
      font-size: 9px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.75);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .fc-cal-num {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
    }

    .fc-cal-day.today .fc-cal-num {
      background: var(--accent);
      color: #1a2e28;
      border-radius: 50%;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    /* ======= TOAST ======= */
    .login-toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--primary);
      color: #fff;
      padding: 11px 22px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      z-index: 999;
      pointer-events: none;
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.35s;
      opacity: 0;
      white-space: nowrap;
    }

    .login-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .login-toast.error { background: #c0392b; }

    /* ======= RESPONSIVE ======= */
    @media (max-width: 720px) {
      body {
        padding: 0;
        align-items: stretch;
        background:
          linear-gradient(rgba(13, 31, 24, 0.45), rgba(13, 31, 24, 0.45)),
          url('/assets/login-cover-happy.png') center center / cover no-repeat;
      }

      .login-card {
        flex-direction: column;
        border-radius: 0;
        min-height: 100vh;
        box-shadow: none;
        background: transparent;
      }

      .form-panel {
        flex: none;
        padding: 40px 28px 32px;
        order: 1;
        background: rgba(255, 255, 255, 0.78);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-radius: 16px 16px 0 0;
        margin-top: auto;
      }

      .image-panel {
        display: none;
      }

      .float-card-cal { display: none; }
    }

    @media (max-width: 900px) and (min-width: 721px) {
      .form-panel { padding: 36px 36px 28px; }
      .float-card-cal { display: none; }
    }

    /* ── Role hint (below Employee ID in step 1) ─────── */
    .role-hint {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12.5px;
      font-weight: 500;
      margin-bottom: 16px;
      margin-top: -6px;
    }

    .role-hint.role-employee  { background: #EEF2FF; color: #3730A3; }
    .role-hint.role-admin     { background: #FFF7ED; color: #92400E; }
    .role-hint.role-sa        { background: #F0FDF4; color: #14532D; }

    /* ── ID chip (locked Employee ID shown in step 2) ─── */
    .id-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #F3F4F6;
      border: 1px solid #E5E7EB;
      border-radius: 10px;
      padding: 9px 14px;
      margin-bottom: 16px;
    }

    .id-chip-label {
      font-size: 11px;
      font-weight: 600;
      color: #9CA3AF;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }

    .id-chip-value {
      font-size: 13.5px;
      font-weight: 600;
      color: #111827;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .id-chip-change {
      background: none;
      border: none;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      color: var(--primary-dark);
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .id-chip-change:hover { background: rgba(90, 143, 123, 0.10); }

    /* ── Role badge (step 2) ─────── */
    .role-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 18px;
      letter-spacing: 0.01em;
    }

    .role-badge.role-employee  { background: #EEF2FF; color: #4338CA; }
    .role-badge.role-admin     { background: #FFF7ED; color: #C2410C; }
    .role-badge.role-sa        { background: #F0FDF4; color: #15803D; border: 1px solid #BBF7D0; }

    #saToggleLink { display: none; }

  </style>
</head>
<body>

  <!-- ── OUTER CARD ─────── -->
  <div class="login-card">

    <!-- ── LEFT: form panel ─────── -->
    <div class="form-panel">

      <!-- Logo pill -->
      <a class="logo-pill" href="/" aria-label="myWORKDESK home">
        <img src="https://res.cloudinary.com/dkqr6pxfr/image/upload/workdesk-logo.png.png" alt="myWORKDESK" />
      </a>

      <!-- Heading -->
      <h1 class="form-heading">Welcome Back</h1>
      <p class="form-sub">Sign in as Super Admin, Admin, or Employee</p>

      <!-- Form -->
      <form id="loginForm" novalidate>

        <input type="hidden" id="loginRole" name="loginRole" value="employee" />

        <!-- ── STEP 1: Employee ID ──────────────────────────────────── -->
        <div id="step1">
          <div class="field-group" id="employeeIdGroup">
            <label class="field-label" for="employeeId">Employee ID</label>
            <div class="field-input-wrap">
              <input
                type="text"
                id="employeeId"
                name="employeeId"
                class="field-input"
                placeholder="e.g. EMP001, ADMIN001, or SA-KEY"
                autocomplete="username"
                autofocus
              />
            </div>
            <span class="field-error" id="employeeIdError">Required</span>
          </div>

          <!-- Role detection hint shown while typing -->
          <div class="role-hint" id="roleHint" hidden>
            <span id="roleHintText"></span>
          </div>

          <button type="button" class="btn-submit" id="continueBtn">
            <span class="btn-label">Continue</span>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" width="16" height="16" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
            </svg>
          </button>
        </div>

        <!-- ── STEP 2: Username + Password ─────────────────────────── -->
        <div id="step2" hidden>

          <!-- Locked Employee ID chip -->
          <div class="id-chip">
            <span class="id-chip-label">ID</span>
            <span class="id-chip-value" id="idChipValue"></span>
            <button type="button" class="id-chip-change" id="backBtn" aria-label="Change Employee ID">Change</button>
          </div>

          <!-- Detected role badge -->
          <div class="role-badge" id="roleBadge"></div>

          <!-- Organization ID / Username -->
          <div class="field-group">
            <label class="field-label" for="usernameField" id="usernameLabel">Organization ID</label>
            <div class="field-input-wrap">
              <input
                type="text"
                id="usernameField"
                name="usernameField"
                class="field-input"
                placeholder="e.g. DEMO"
                autocomplete="username"
              />
            </div>
            <span class="field-error" id="usernameError">Required</span>
          </div>

          <!-- Demo credentials hint (employee / admin only) -->
          <div id="demoHint" hidden style="
            background: #EEF2FF;
            border: 1px solid #C7D2FE;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 12px;
            color: #3730A3;
            margin-top: -8px;
            margin-bottom: 16px;
            line-height: 1.6;
          ">
            <strong>Demo credentials:</strong><br>
            Organization ID: <code style="background:#C7D2FE;border-radius:4px;padding:1px 5px">DEMO</code>
            &nbsp;·&nbsp;
            Employee ID: <code style="background:#C7D2FE;border-radius:4px;padding:1px 5px">EMP001</code>
            &nbsp;·&nbsp;
            Password: <code style="background:#C7D2FE;border-radius:4px;padding:1px 5px">WorkDesk@2025</code>
          </div>

          <!-- Password -->
          <div class="field-group">
            <label class="field-label" for="password">Password</label>
            <div class="field-input-wrap">
              <input
                type="password"
                id="password"
                name="password"
                class="field-input pwd-input"
                placeholder="••••••••••••"
                autocomplete="current-password"
                required
              />
              <button type="button" class="pwd-eye" id="eyeToggle" aria-label="Toggle password visibility">
                <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="17" height="17">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
              </button>
            </div>
            <span class="field-error" id="passwordError">Required</span>
          </div>

          <!-- Sign In button -->
          <button type="submit" class="btn-submit" id="loginBtn">
            <span class="btn-label">Sign In</span>
            <span class="h-spinner" aria-hidden="true"></span>
          </button>

        </div>

      </form>

      <!-- Bottom links -->
      <div class="bottom-links">
        <span>Need help? <a href="#forgot" id="forgotLink">Forgot Password?</a></span>
      </div>

    </div>

    <!-- ── RIGHT: image panel ─────── -->
    <div class="image-panel">
      <img class="panel-photo" src="/assets/login-cover-happy.png" alt="Team at work" />

      <!-- Calendar strip -->
      <div class="float-card-cal" aria-hidden="true">
        <div class="fc-cal-days" id="calDays"></div>
      </div>
    </div>

  </div><!-- /.login-card -->

  <!-- Toast notification -->
  <div class="login-toast" id="loginToast" role="status" aria-live="polite"></div>

  <script>
    // ── Session guard: already logged in → go to dashboard ───────────────────
    (function () {
      try {
        var saRaw = localStorage.getItem('sa_session');
        if (saRaw) {
          var saSess = JSON.parse(saRaw);
          if (saSess && saSess.token && saSess.role === 'super_admin') {
            window.location.replace('/pages/sa-dashboard.html');
            return;
          }
        }
        if (localStorage.getItem('workdesk_token')) {
          window.location.replace('/app/dashboard.html');
        }
      } catch (_) {}
    }());

    // ── Build 7-day calendar strip centred on today ───────────────────────────
    (function () {
      var days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      var today = new Date();
      var todayNum = today.getDate();
      var container = document.getElementById('calDays');
      for (var i = -3; i <= 3; i++) {
        var d = new Date(today);
        d.setDate(todayNum + i);
        var isToday = i === 0;
        var div = document.createElement('div');
        div.className = 'fc-cal-day' + (isToday ? ' today' : '');
        div.innerHTML =
          '<span class="fc-cal-label">' + days[d.getDay()] + '</span>' +
          '<span class="fc-cal-num">' + d.getDate() + '</span>';
        container.appendChild(div);
      }
    }());

    // ── Toast helper ─────────────────────────────────────────────────────────
    function showToast(msg, isError, duration) {
      var toast = document.getElementById('loginToast');
      toast.textContent = msg;
      toast.classList.toggle('error', !!isError);
      toast.classList.add('show');
      setTimeout(function () { toast.classList.remove('show'); }, duration || 3000);
    }

    // ── Field error helpers ───────────────────────────────────────────────────
    function setFieldError(inputId, errorId, message) {
      var input = document.getElementById(inputId);
      var err   = document.getElementById(errorId);
      if (!input || !err) return;
      if (message) {
        input.classList.add('is-invalid');
        err.textContent   = message;
        err.style.display = 'block';
      } else {
        input.classList.remove('is-invalid');
        err.style.display = 'none';
      }
    }

    function clearFieldErrors() {
      setFieldError('employeeId',   'employeeIdError',   null);
      setFieldError('usernameField', 'usernameError',    null);
      setFieldError('password',     'passwordError',     null);
    }

    // ── Role inference from Employee ID ──────────────────────────────────────
    // SA: ID starts with SA/SUPER/CEO (e.g. SA-KEY-001, SUPER-2025, CEO).
    //     The Employee ID is used as the Security Key for SA authentication.
    // Admin: ID starts with ADMIN/ADM (e.g. ADMIN-01, ADM001).
    // Employee: all other IDs.
    function inferRoleFromEmployeeId(employeeId) {
      var id = (employeeId || '').trim().toUpperCase();
      if (!id) return 'employee';
      if (/^(SA|SUPER|CEO)([-_].+|[0-9].+)?$/.test(id)) return 'super_admin';
      if (/^(ADMIN|ADM)([-_].+|[0-9].+)?$/.test(id)) return 'admin';
      return 'employee';
    }

    // ── Step 1 → update role hint as user types ───────────────────────────────
    document.getElementById('employeeId').addEventListener('input', function () {
      setFieldError('employeeId', 'employeeIdError', null);
      var val  = this.value.trim();
      var role = inferRoleFromEmployeeId(val);
      var hint = document.getElementById('roleHint');
      var hintText = document.getElementById('roleHintText');
      if (!val) { hint.hidden = true; return; }
      hint.hidden = false;
      hint.className = 'role-hint ' +
        (role === 'super_admin' ? 'role-sa' : role === 'admin' ? 'role-admin' : 'role-employee');
      hintText.textContent = role === 'super_admin'
        ? '🔐 Super Admin detected — your Employee ID is your Security Key'
        : role === 'admin'
        ? '🛡️ Admin access detected'
        : '👤 Employee access';
    });

    // ── Continue button: lock Employee ID, show step 2 ───────────────────────
    document.getElementById('continueBtn').addEventListener('click', function () {
      var empId = document.getElementById('employeeId').value.trim();
      if (!empId) {
        setFieldError('employeeId', 'employeeIdError', 'Please enter your Employee ID to continue.');
        return;
      }
      setFieldError('employeeId', 'employeeIdError', null);

      var role = inferRoleFromEmployeeId(empId);
      document.getElementById('loginRole').value = role;

      // Populate ID chip
      document.getElementById('idChipValue').textContent = empId;

      // Set role badge
      var badge = document.getElementById('roleBadge');
      if (role === 'super_admin') {
        badge.textContent = '🔐 Super Admin';
        badge.className   = 'role-badge role-sa';
      } else if (role === 'admin') {
        badge.textContent = '🛡️ Admin';
        badge.className   = 'role-badge role-admin';
      } else {
        badge.textContent = '👤 Employee';
        badge.className   = 'role-badge role-employee';
      }

      // Update sub-heading
      var sub = document.querySelector('.form-sub');
      if (sub) {
        sub.textContent = role === 'super_admin'
          ? 'Secure Super Admin access — enter your credentials'
          : 'Sign in to your workspace';
      }

      // Update username label and placeholder based on role
      var usernameInput = document.getElementById('usernameField');
      var usernameLabel = document.getElementById('usernameLabel');
      var demoHint      = document.getElementById('demoHint');
      if (usernameInput) {
        if (role === 'super_admin') {
          usernameInput.placeholder = 'Super admin username';
          if (usernameLabel) usernameLabel.textContent = 'Username';
          if (demoHint) demoHint.hidden = true;
        } else {
          usernameInput.placeholder = 'e.g. DEMO';
          if (usernameLabel) usernameLabel.textContent = 'Organization ID';
          if (demoHint) demoHint.hidden = false;
        }
      }

      // Switch to step 2
      document.getElementById('step1').hidden = true;
      document.getElementById('step2').hidden = false;
      document.getElementById('usernameField').focus();
    });

    // Allow pressing Enter in Employee ID field to continue
    document.getElementById('employeeId').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        document.getElementById('continueBtn').click();
      }
    });

    // ── Back button: return to step 1 ────────────────────────────────────────
    document.getElementById('backBtn').addEventListener('click', function () {
      document.getElementById('step2').hidden = true;
      document.getElementById('step1').hidden = false;
      // Clear step 2 fields
      document.getElementById('usernameField').value = '';
      document.getElementById('password').value = '';
      // Reset label and hint to defaults
      var lbl = document.getElementById('usernameLabel');
      if (lbl) lbl.textContent = 'Organization ID';
      var hint = document.getElementById('demoHint');
      if (hint) hint.hidden = true;
      clearFieldErrors();
      document.getElementById('employeeId').focus();
    });

    // ── Password visibility toggle ────────────────────────────────────────────
    document.getElementById('eyeToggle').addEventListener('click', function () {
      var pwd  = document.getElementById('password');
      var icon = document.getElementById('eyeIcon');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>';
      } else {
        pwd.type = 'password';
        icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
      }
    });

    // ── Field input error clear ───────────────────────────────────────────────
    document.getElementById('usernameField').addEventListener('input', function () {
      setFieldError('usernameField', 'usernameError', null);
    });
    document.getElementById('password').addEventListener('input', function () {
      setFieldError('password', 'passwordError', null);
    });

    // ── Forgot password ───────────────────────────────────────────────────────
    document.getElementById('forgotLink').addEventListener('click', function (e) {
      e.preventDefault();
      var role = document.getElementById('loginRole').value;
      if (role === 'super_admin') {
        showToast('For Super Admin credential resets, contact platform security support.', false);
        return;
      }
      if (role === 'admin') {
        showToast('For Admin credential resets, contact your organization administrator.', false);
        return;
      }
      var empId = document.getElementById('employeeId').value.trim();
      if (!empId) {
        showToast('Enter your Employee ID first, then click Forgot Password.', false);
        return;
      }
      showToast('Password reset request submitted for Employee ID: ' + empId + '. Contact your HR Team.', false);
    });

    // ── Login form submit ─────────────────────────────────────────────────────
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      clearFieldErrors();

      var btn        = document.getElementById('loginBtn');
      var role       = document.getElementById('loginRole').value;
      var employeeId = document.getElementById('employeeId').value.trim();
      var username   = document.getElementById('usernameField').value.trim();
      var password   = document.getElementById('password').value;
      var valid      = true;

      if (!username) { setFieldError('usernameField', 'usernameError', 'Required'); valid = false; }
      if (!password) { setFieldError('password',      'passwordError', 'Required'); valid = false; }
      if (!valid) return;

      var btnLabel = btn.querySelector('.btn-label');
      if (btnLabel) btnLabel.textContent = 'Signing in\u2026';
      btn.classList.add('loading');
      btn.disabled = true;

      var onDone = function () {
        if (btnLabel) btnLabel.textContent = 'Sign In';
        btn.classList.remove('loading');
        btn.disabled = false;
      };

      // ── Super Admin login ─────────────────────────────────────────────────
      // employeeId = Security Key (orgId), username = SA_USERNAME, password = SA_PASSWORD
      if (role === 'super_admin') {
        fetch('/api/sa-auth', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ username: username, orgId: employeeId, password: password })
        })
        .then(function (res) { return res.json().then(function (d) { return { status: res.status, data: d }; }); })
        .then(function (result) {
          if (result.data && result.data.ok) {
            var saTitle = result.data.title || 'CEO';
            localStorage.removeItem('workdesk_token');
            localStorage.removeItem('workdesk_role');
            localStorage.removeItem('workdesk_display_name');
            localStorage.setItem('sa_token', result.data.token);
            localStorage.setItem('sa_session', JSON.stringify({
              token:       result.data.token,
              username:    result.data.username,
              role:        'super_admin',
              title:       saTitle,
              permissions: ['*'],
              issuedAt:    Date.now()
            }));
            localStorage.setItem('workdesk_display_name', result.data.username || saTitle);
            window.location.replace('/pages/sa-dashboard.html#security');
            return;
          }
          showToast(result.data && result.data.message ? result.data.message : 'Invalid credentials. Access denied.', true);
          onDone();
        })
        .catch(function () {
          showToast('Login failed. Please check your connection and try again.', true);
          onDone();
        });
        return;
      }

      // ── Admin / Employee login ────────────────────────────────────────────
      // employeeId = employee ID, username = org/workspace ID (orgId), password = password
      var nameParts   = employeeId.split(/[._-]/).filter(function (w) { return w.length > 0; });
      var displayName = nameParts.length > 0
        ? nameParts.map(function (w) { return w.charAt(0).toUpperCase() + w.slice(1).toLowerCase(); }).join(' ')
        : 'Employee ' + employeeId;
      localStorage.setItem('workdesk_display_name', displayName);
      localStorage.setItem('workdesk_role', role === 'admin' ? 'Admin' : 'Employee');
      localStorage.removeItem('sa_session');
      localStorage.removeItem('sa_token');

      fetch('/api/auth', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ orgId: username, employeeId: employeeId, password: password, role: role })
      })
      .then(function (res) { return res.json(); })
      .then(function (data) {
        if (data && data.ok) {
          if (data.token) localStorage.setItem('workdesk_token', data.token);
          window.location.replace('/app/dashboard.html');
        } else {
          showToast(data && data.message ? data.message : 'Invalid credentials. Please check demo accounts or override credentials.', true);
          onDone();
        }
      })
      .catch(function () {
        showToast('Login failed. Please check your connection and try again.', true);
        onDone();
      });
    });
  </script>

</body>
</html>
