<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
  <title>myWORKDESK | Secure Enterprise Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --primary:      #5A8F7B;
      --primary-dark: #497263;
      --primary-rgb:  90, 143, 123;
      --accent:       #F4C86A;
      --accent-dark:  #E6B84E;
      --danger:       #E74C3C;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #E8E4DE 0%, #CEC9C1 100%);
      -webkit-font-smoothing: antialiased;
      padding: 24px 16px;
    }

    /* ======= OUTER CARD ======= */
    .login-card {
      width: 940px;
      max-width: 100%;
      min-height: 600px;
      background: rgba(255, 255, 255, 0.22);
      border-radius: 24px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      display: flex;
      overflow: hidden;
    }

    /* ======= LEFT: FORM PANEL ======= */
    .form-panel {
      flex: 0 0 42%;
      display: flex;
      flex-direction: column;
      padding: 44px 48px 36px;
      background: rgba(255, 255, 255, 0.68);
    }

    /* ── Logo pill ─────── */
    .logo-pill {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      border: 1.5px solid #D8D8D8;
      border-radius: 50px;
      padding: 7px 18px 7px 10px;
      align-self: flex-start;
      margin-bottom: 40px;
      text-decoration: none;
    }

    .logo-pill img {
      height: 26px;
      width: auto;
    }

    .logo-pill span {
      font-size: 13px;
      font-weight: 700;
      color: #1a2e28;
      letter-spacing: 0.01em;
    }

    /* ── Heading ─────── */
    .form-heading {
      font-size: 30px;
      font-weight: 700;
      color: #111827;
      line-height: 1.18;
      margin-bottom: 8px;
    }

    .form-sub {
      font-size: 13.5px;
      color: #9CA3AF;
      margin-bottom: 30px;
      line-height: 1.4;
    }

    /* ── Field groups ─────── */
    .field-group {
      margin-bottom: 18px;
    }

    .field-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #6B7280;
      margin-bottom: 7px;
    }

    .field-input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .field-input {
      width: 100%;
      height: 50px;
      padding: 0 16px;
      border: 1px solid #E5E7EB;
      border-radius: 14px;
      background: #FAFAFA;
      font-family: inherit;
      font-size: 14px;
      color: #111827;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .field-input::placeholder { color: #C4C4C4; }

    .field-input:focus {
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(var(--primary-rgb), 0.12);
    }

    .field-input.is-invalid { border-color: var(--danger); }

    /* ── Password eye toggle ─────── */
    .field-input.pwd-input { padding-right: 44px; }

    .pwd-eye {
      position: absolute;
      right: 13px;
      background: none;
      border: none;
      cursor: pointer;
      color: #9CA3AF;
      padding: 0;
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }

    .pwd-eye:hover { color: var(--primary-dark); }

    /* ── Field error ─────── */
    .field-error {
      font-size: 11px;
      color: var(--danger);
      margin-top: 5px;
      display: none;
      padding-left: 2px;
    }

    /* ── Submit button ─────── */
    .btn-submit {
      width: 100%;
      height: 52px;
      background: var(--accent);
      border: none;
      border-radius: 14px;
      color: #1a2e28;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
    }

    .btn-submit:hover {
      background: var(--accent-dark);
      box-shadow: 0 8px 22px rgba(230, 184, 78, 0.40);
      transform: translateY(-1px);
    }

    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.68; cursor: not-allowed; transform: none; }

    .h-spinner {
      display: none;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(26, 46, 40, 0.28);
      border-top-color: #1a2e28;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-submit.loading .h-spinner { display: block; }

    /* ── OR separator ─────── */
    .or-sep {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      font-size: 12px;
      font-weight: 500;
      color: #D1D5DB;
    }

    .or-sep::before,
    .or-sep::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #E5E7EB;
    }

    /* ── SSO buttons ─────── */
    .sso-row {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
    }

    .sso-btn {
      flex: 1;
      height: 48px;
      background: #fff;
      border: 1.5px solid #E5E7EB;
      border-radius: 14px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }

    .sso-btn:hover {
      background: #F9FAFB;
      border-color: #C9CDD4;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    /* ── Bottom links row ─────── */
    .bottom-links {
      margin-top: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12.5px;
      color: #9CA3AF;
    }

    .bottom-links a {
      color: var(--primary-dark);
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s;
    }

    .bottom-links a:hover { text-decoration: underline; }

    /* ======= RIGHT: IMAGE PANEL ======= */
    .image-panel {
      flex: 1;
      position: relative;
      overflow: hidden;
      border-radius: 0 20px 20px 0;
    }

    .panel-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── Calendar strip (lower area of image) ─────── */
    .float-card-cal {
      position: absolute;
      bottom: 36px;
      right: 20px;
      transform: none;
      background: rgba(255, 255, 255, 0.18);
      border-radius: 14px;
      padding: 12px 16px;
      backdrop-filter: blur(12px) saturate(140%);
      -webkit-backdrop-filter: blur(12px) saturate(140%);
      border: 1px solid rgba(255, 255, 255, 0.30);
    }

    .fc-cal-days {
      display: flex;
      gap: 6px;
    }

    .fc-cal-day {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      min-width: 28px;
    }

    .fc-cal-label {
      font-size: 9px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.75);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .fc-cal-num {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
    }

    .fc-cal-day.today .fc-cal-num {
      background: var(--accent);
      color: #1a2e28;
      border-radius: 50%;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    /* ======= TOAST ======= */
    .login-toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--primary);
      color: #fff;
      padding: 11px 22px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      z-index: 999;
      pointer-events: none;
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.35s;
      opacity: 0;
      white-space: nowrap;
    }

    .login-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .login-toast.error { background: #c0392b; }

    /* ======= RESPONSIVE ======= */
    @media (max-width: 720px) {
      body {
        padding: 0;
        align-items: stretch;
        background:
          linear-gradient(rgba(13, 31, 24, 0.55), rgba(13, 31, 24, 0.55)),
          url('/assets/login-cover-happy.png') center center / cover no-repeat;
      }

      .login-card {
        flex-direction: column;
        border-radius: 0;
        min-height: 100vh;
        box-shadow: none;
        background: transparent;
      }

      .form-panel {
        flex: none;
        padding: 40px 28px 32px;
        order: 1;
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-radius: 16px 16px 0 0;
        margin-top: auto;
      }

      .image-panel {
        display: none;
      }

      .float-card-cal { display: none; }
    }

    @media (max-width: 900px) and (min-width: 721px) {
      .form-panel { padding: 36px 36px 28px; }
      .float-card-cal { display: none; }
    }

    /* ── Daily quote card ─────── */
    .daily-quote {
      background: rgba(235, 244, 241, 0.92);
      border: 1px solid rgba(90, 143, 123, 0.25);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 20px;
      font-size: 12px;
      color: #3a6b5e;
      line-height: 1.6;
    }

    .daily-quote .quote-label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--primary);
      margin-bottom: 4px;
    }

    .daily-quote blockquote {
      margin: 0;
      font-size: 12.5px;
      color: #2f5f53;
    }

    .daily-quote cite {
      display: block;
      margin-top: 4px;
      font-style: normal;
      font-size: 11px;
      color: #3a6b5e;
    }

  </style>
</head>
<body>

  <!-- ── OUTER CARD ─────── -->
  <div class="login-card">

    <!-- ── LEFT: form panel ─────── -->
    <div class="form-panel">

      <!-- Logo pill -->
      <a class="logo-pill" href="/" aria-label="myWORKDESK home">
        <img src="/assets/workdesk-logo.svg" alt="myWORKDESK" />
        <span>myWORKDESK</span>
      </a>

      <!-- Heading -->
      <h1 class="form-heading">Welcome Back</h1>
      <p class="form-sub">Sign in as Super Admin, Admin, or Employee</p>

      <!-- Form -->
      <form id="loginForm" novalidate>

        <input type="hidden" id="loginRole" name="loginRole" value="employee" />

        <!-- Organization ID -->
        <div class="field-group role-regular">
          <label class="field-label" for="orgId">Organization ID</label>
          <div class="field-input-wrap">
            <input
              type="text"
              id="orgId"
              name="orgId"
              class="field-input"
              placeholder="e.g. acme-corp"
              autocomplete="off"
              required
            />
          </div>
          <span class="field-error" id="orgIdError">Required</span>
        </div>

        <!-- Employee ID -->
        <div class="field-group" id="employeeIdGroup">
          <label class="field-label" for="employeeId">Employee ID</label>
          <div class="field-input-wrap">
            <input
              type="text"
              id="employeeId"
              name="employeeId"
              class="field-input"
              placeholder="e.g. john.smith"
              autocomplete="username"
              required
            />
          </div>
          <span class="field-error" id="employeeIdError">Required</span>
        </div>

        <!-- Super Admin Username -->
        <div class="field-group role-superadmin" id="saUsernameGroup" hidden>
          <label class="field-label" for="saUsername">Username</label>
          <div class="field-input-wrap">
            <input
              type="text"
              id="saUsername"
              name="saUsername"
              class="field-input"
              placeholder="super admin username"
              autocomplete="username"
            />
          </div>
          <span class="field-error" id="saUsernameError">Required</span>
        </div>

        <!-- Super Admin Security Key -->
        <div class="field-group role-superadmin" id="saSecretKeyGroup" hidden>
          <label class="field-label" for="saSecretKey">Security Key</label>
          <div class="field-input-wrap">
            <input
              type="password"
              id="saSecretKey"
              name="saSecretKey"
              class="field-input pwd-input"
              placeholder="••••••••••••"
              autocomplete="off"
            />
            <button type="button" class="pwd-eye" id="eyeToggleKey" aria-label="Toggle security key visibility">
              <svg id="eyeIconKey" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="17" height="17">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
          <span class="field-error" id="saSecretKeyError">Required</span>
        </div>

        <!-- Password -->
        <div class="field-group">
          <label class="field-label" for="password">Password</label>
          <div class="field-input-wrap">
            <input
              type="password"
              id="password"
              name="password"
              class="field-input pwd-input"
              placeholder="••••••••••••"
              autocomplete="current-password"
              required
            />
            <button type="button" class="pwd-eye" id="eyeToggle" aria-label="Toggle password visibility">
              <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="17" height="17">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
          <span class="field-error" id="passwordError">Required</span>
        </div>

        <section class="daily-quote" aria-live="polite">
          <span class="quote-label">Daily Quote</span>
          <blockquote>
            <span id="dailyQuoteText"></span>
            <cite id="dailyQuoteAuthor"></cite>
          </blockquote>
        </section>

        <!-- Sign In button -->
        <button type="submit" class="btn-submit" id="loginBtn">
          <span class="btn-label">Sign In</span>
          <span class="h-spinner" aria-hidden="true"></span>
        </button>

        <!-- OR separator -->
        <div class="or-sep">OR</div>

        <!-- SSO buttons -->
        <div class="sso-row">
          <button type="button" class="sso-btn" id="googleBtn" aria-label="Sign in with Google">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Google
          </button>
          <button type="button" class="sso-btn" id="msBtn" aria-label="Sign in with Microsoft">
            <svg width="16" height="16" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M11.4 2H2v9.4h9.4V2z" fill="#F25022"/>
              <path d="M22 2h-9.4v9.4H22V2z" fill="#7FBA00"/>
              <path d="M11.4 12.6H2V22h9.4v-9.4z" fill="#00A4EF"/>
              <path d="M22 12.6h-9.4V22H22v-9.4z" fill="#FFB900"/>
            </svg>
            Microsoft
          </button>
        </div>

      </form>

      <!-- Bottom links -->
      <div class="bottom-links">
        <span>Need help? <a href="#forgot" id="forgotLink">Forgot Password?</a></span>
        <a href="#terms" id="termsLink">Terms &amp; Conditions</a>
      </div>

    </div>

    <!-- ── RIGHT: image panel ─────── -->
    <div class="image-panel">
      <img class="panel-photo" src="/assets/login-cover-happy.png" alt="Team at work" />

      <!-- Calendar strip -->
      <div class="float-card-cal" aria-hidden="true">
        <div class="fc-cal-days" id="calDays"></div>
      </div>
    </div>

  </div><!-- /.login-card -->

  <!-- Toast notification -->
  <div class="login-toast" id="loginToast" role="status" aria-live="polite"></div>

  <script>
    // ── Session guard: already logged in → go to dashboard ───────────────────
    (function () {
      try {
        var saRaw = localStorage.getItem('sa_session');
        if (saRaw) {
          var saSess = JSON.parse(saRaw);
          if (saSess && saSess.token && saSess.role === 'super_admin') {
            window.location.replace('/pages/sa-dashboard.html');
            return;
          }
        }
        if (localStorage.getItem('workdesk_token')) {
          window.location.replace('/app/dashboard.html');
        }
      } catch (_) {}
    }());

    // ── Build 7-day calendar strip centred on today ───────────────────────────
    (function () {
      var days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      var today = new Date();
      var todayNum = today.getDate();
      var container = document.getElementById('calDays');
      for (var i = -3; i <= 3; i++) {
        var d = new Date(today);
        d.setDate(todayNum + i);
        var isToday = i === 0;
        var div = document.createElement('div');
        div.className = 'fc-cal-day' + (isToday ? ' today' : '');
        div.innerHTML =
          '<span class="fc-cal-label">' + days[d.getDay()] + '</span>' +
          '<span class="fc-cal-num">' + d.getDate() + '</span>';
        container.appendChild(div);
      }
    }());

    // ── Daily quote (30 quotes rotating each day) ─────────────────────────────
    (function () {
      var quotes = [
        { text: 'Success is the sum of small efforts, repeated day in and day out.', author: 'Robert Collier' },
        { text: 'The future depends on what you do today.', author: 'Mahatma Gandhi' },
        { text: 'Quality means doing it right when no one is looking.', author: 'Henry Ford' },
        { text: 'Discipline is choosing between what you want now and what you want most.', author: 'Abraham Lincoln' },
        { text: 'Well done is better than well said.', author: 'Benjamin Franklin' },
        { text: 'Do not wait. The time will never be just right.', author: 'Napoleon Hill' },
        { text: 'Great things are done by a series of small things brought together.', author: 'Vincent van Gogh' },
        { text: 'Action is the foundational key to all success.', author: 'Pablo Picasso' },
        { text: 'Either you run the day, or the day runs you.', author: 'Jim Rohn' },
        { text: 'Small daily improvements are the key to staggering long-term results.', author: 'Robin Sharma' },
        { text: 'Dream big. Start small. Act now.', author: 'Robin Sharma' },
        { text: 'Perseverance is not a long race; it is many short races one after the other.', author: 'Walter Elliot' },
        { text: 'The secret of getting ahead is getting started.', author: 'Mark Twain' },
        { text: 'The best way out is always through.', author: 'Robert Frost' },
        { text: 'What we do repeatedly becomes our excellence.', author: 'Will Durant' },
        { text: 'Simplicity is the ultimate sophistication.', author: 'Leonardo da Vinci' },
        { text: 'Focus on being productive instead of busy.', author: 'Tim Ferriss' },
        { text: 'You do not have to be great to start, but you have to start to be great.', author: 'Zig Ziglar' },
        { text: 'Start where you are. Use what you have. Do what you can.', author: 'Arthur Ashe' },
        { text: 'If you can dream it, you can do it.', author: 'Walt Disney' },
        { text: 'Progress is impossible without change.', author: 'George Bernard Shaw' },
        { text: 'Do one thing every day that moves you forward.', author: 'Unknown' },
        { text: 'Your habits shape your future.', author: 'Jack Canfield' },
        { text: 'Make each day your masterpiece.', author: 'John Wooden' },
        { text: 'Courage is resistance to fear, mastery of fear, not absence of fear.', author: 'Mark Twain' },
        { text: 'Success usually comes to those who are too busy to be looking for it.', author: 'Henry David Thoreau' },
        { text: 'Do the hard jobs first. The easy jobs will take care of themselves.', author: 'Dale Carnegie' },
        { text: 'Where focus goes, energy flows.', author: 'Tony Robbins' },
        { text: 'The way to get started is to quit talking and begin doing.', author: 'Walt Disney' },
        { text: 'Do not watch the clock; do what it does. Keep going.', author: 'Sam Levenson' }
      ];
      var quoteTextEl = document.getElementById('dailyQuoteText');
      var quoteAuthorEl = document.getElementById('dailyQuoteAuthor');
      if (!quoteTextEl || !quoteAuthorEl || !quotes.length) return;

      var dayNumber = Math.floor(Date.now() / 86400000);
      var quote = quotes[((dayNumber % quotes.length) + quotes.length) % quotes.length];
      quoteTextEl.textContent = '"' + quote.text + '"';
      quoteAuthorEl.textContent = '— ' + quote.author;
    }());

    // ── Toast helper ─────────────────────────────────────────────────────────
    function showToast(msg, isError, duration) {
      var toast = document.getElementById('loginToast');
      toast.textContent = msg;
      toast.classList.toggle('error', !!isError);
      toast.classList.add('show');
      setTimeout(function () { toast.classList.remove('show'); }, duration || 3000);
    }

    // ── Field error helpers ───────────────────────────────────────────────────
    function setFieldError(inputId, errorId, message) {
      var input = document.getElementById(inputId);
      var err   = document.getElementById(errorId);
      if (!input || !err) return;
      if (message) {
        input.classList.add('is-invalid');
        err.textContent   = message;
        err.style.display = 'block';
      } else {
        input.classList.remove('is-invalid');
        err.style.display = 'none';
      }
    }

    function clearFieldErrors() {
      setFieldError('orgId',      'orgIdError',      null);
      setFieldError('employeeId', 'employeeIdError', null);
      setFieldError('password',   'passwordError',   null);
      setFieldError('saUsername', 'saUsernameError', null);
      setFieldError('saSecretKey', 'saSecretKeyError', null);
    }

    function inferRoleFromEmployeeId(employeeId) {
      var id = (employeeId || '').trim().toUpperCase();
      if (!id) return 'employee';
      // Super Admin IDs must start with SA/SUPER/CEO (e.g. SA-001, SUPER001, CEO123).
      if (/^(SA|SUPER|CEO)([-_].+|[0-9].+)?$/.test(id)) return 'super_admin';
      // Admin IDs must start with ADMIN/ADM (e.g. ADMIN-01, ADM001).
      if (/^(ADMIN|ADM)([-_].+|[0-9].+)?$/.test(id)) return 'admin';
      return 'employee';
    }

    function syncRoleFromEmployeeId() {
      var employeeIdInput = document.getElementById('employeeId');
      var roleInput = document.getElementById('loginRole');
      if (!employeeIdInput || !roleInput) return;
      roleInput.value = inferRoleFromEmployeeId(employeeIdInput.value);
      setRoleMode();
    }

    function setRoleMode() {
      var role = (document.getElementById('loginRole') || {}).value || 'employee';
      var regularFields = document.querySelectorAll('.role-regular');
      var superFields = document.querySelectorAll('.role-superadmin');
      var sub = document.querySelector('.form-sub');
      var passwordLabel = document.querySelector('label[for="password"]');
      var saSecretKeyGroup = document.getElementById('saSecretKeyGroup');

      regularFields.forEach(function (el) { el.hidden = role === 'super_admin'; });
      superFields.forEach(function (el) { el.hidden = role !== 'super_admin'; });

      if (sub) {
        sub.textContent = role === 'super_admin'
          ? 'Secure CEO/Super Admin access with all permissions'
          : 'Sign in to access your workspace';
      }
      if (passwordLabel) passwordLabel.textContent = role === 'super_admin' ? 'Passkey' : 'Password';
      // In super-admin mode, the Password field is repurposed as the passkey input.
      if (saSecretKeyGroup && role === 'super_admin') saSecretKeyGroup.hidden = true;
    }

    document.getElementById('orgId').addEventListener('input', function () {
      setFieldError('orgId', 'orgIdError', null);
    });
    document.getElementById('employeeId').addEventListener('input', function () {
      setFieldError('employeeId', 'employeeIdError', null);
      syncRoleFromEmployeeId();
    });
    document.getElementById('password').addEventListener('input', function () {
      setFieldError('password', 'passwordError', null);
    });
    document.getElementById('saUsername').addEventListener('input', function () {
      setFieldError('saUsername', 'saUsernameError', null);
    });
    document.getElementById('saSecretKey').addEventListener('input', function () {
      setFieldError('saSecretKey', 'saSecretKeyError', null);
    });
    syncRoleFromEmployeeId();
    setRoleMode();

    // ── Password visibility toggle ────────────────────────────────────────────
    document.getElementById('eyeToggle').addEventListener('click', function () {
      var pwd  = document.getElementById('password');
      var icon = document.getElementById('eyeIcon');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>';
      } else {
        pwd.type = 'password';
        icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
      }
    });
    document.getElementById('eyeToggleKey').addEventListener('click', function () {
      var input  = document.getElementById('saSecretKey');
      var icon = document.getElementById('eyeIconKey');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>';
      } else {
        input.type = 'password';
        icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
      }
    });

    // ── Forgot password ───────────────────────────────────────────────────────
    document.getElementById('forgotLink').addEventListener('click', function (e) {
      e.preventDefault();
      var role = document.getElementById('loginRole').value;
      if (role === 'super_admin') {
        showToast('For Super Admin credential resets, contact platform security support.', false);
        return;
      }
      if (role === 'admin') {
        showToast('For Admin credential resets, contact your organization administrator.', false);
        return;
      }
      var empId = document.getElementById('employeeId').value.trim();
      if (!empId) {
        setFieldError('employeeId', 'employeeIdError', 'Enter Employee ID first.');
        return;
      }
      showToast('Password reset request submitted for Employee ID: ' + empId + '. Contact your HR Team.', false);
    });

    // ── Social SSO buttons ────────────────────────────────────────────────────
    document.getElementById('googleBtn').addEventListener('click', function () {
      showToast('Google SSO is configured via your Cloudflare Access policy.', false);
    });
    document.getElementById('msBtn').addEventListener('click', function () {
      showToast('Microsoft SSO is configured via your Cloudflare Access policy.', false);
    });

    // ── Terms & Conditions link ───────────────────────────────────────────────
    document.getElementById('termsLink').addEventListener('click', function (e) {
      e.preventDefault();
      showToast('Organization registration is coming soon. Contact the WorkDesk team to get started.', false);
    });

    // ── Login form submit ─────────────────────────────────────────────────────
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      clearFieldErrors();

      var btn        = document.getElementById('loginBtn');
      var role       = document.getElementById('loginRole').value;
      var orgId      = document.getElementById('orgId').value.trim();
      var employeeId = document.getElementById('employeeId').value.trim();
      var password   = document.getElementById('password').value;
      var saUsername = document.getElementById('saUsername').value.trim();
      var saSecretKey = document.getElementById('saSecretKey').value;
      var valid      = true;

      if (role === 'super_admin') {
        if (!saUsername)  { setFieldError('saUsername', 'saUsernameError', 'Required'); valid = false; }
        if (!employeeId) { setFieldError('employeeId', 'employeeIdError', 'Required'); valid = false; }
      } else {
        if (!orgId)      { setFieldError('orgId',      'orgIdError',      'Required'); valid = false; }
        if (!employeeId) { setFieldError('employeeId', 'employeeIdError', 'Required'); valid = false; }
      }
      if (!password)   { setFieldError('password',   'passwordError',   'Required'); valid = false; }
      if (!valid) return;

      var btnLabel = btn.querySelector('.btn-label');
      if (btnLabel) btnLabel.textContent = 'Signing in\u2026';
      btn.classList.add('loading');
      btn.disabled = true;

      var onDone = function () {
        if (btnLabel) btnLabel.textContent = 'Sign In';
        btn.classList.remove('loading');
        btn.disabled = false;
      };

      if (role === 'super_admin') {
        fetch('/api/sa-auth', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ username: saUsername, employeeId: employeeId, securityKey: password })
        })
        .then(function (res) { return res.json().then(function (d) { return { status: res.status, data: d }; }); })
        .then(function (result) {
          if (result.data && result.data.ok) {
            var saTitle = result.data.title || 'CEO';
            localStorage.removeItem('workdesk_token');
            localStorage.removeItem('workdesk_role');
            localStorage.removeItem('workdesk_display_name');
            localStorage.setItem('sa_token', result.data.token);
            localStorage.setItem('sa_session', JSON.stringify({
              token:       result.data.token,
              username:    result.data.username,
              role:        'super_admin',
              title:       saTitle,
              permissions: ['*'],
              issuedAt:    Date.now()
            }));
            localStorage.setItem('workdesk_display_name', result.data.username || saTitle);
            window.location.replace('/pages/sa-dashboard.html#security');
            return;
          }
          showToast(result.data && result.data.message ? result.data.message : 'Invalid credentials. Access denied.', true);
          onDone();
        })
        .catch(function () {
          showToast('Login failed. Please check your connection and try again.', true);
          onDone();
        });
        return;
      }

      // Persist display name derived from employee ID
      var nameParts   = employeeId.split(/[._-]/).filter(function (w) { return w.length > 0; });
      var displayName = nameParts.length > 0
        ? nameParts.map(function (w) { return w.charAt(0).toUpperCase() + w.slice(1).toLowerCase(); }).join(' ')
        : 'Employee ' + employeeId;
      localStorage.setItem('workdesk_display_name', displayName);
      localStorage.setItem('workdesk_role', role === 'admin' ? 'Admin' : 'Employee');
      localStorage.removeItem('sa_session');
      localStorage.removeItem('sa_token');

      fetch('/api/auth', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ orgId: orgId, employeeId: employeeId, password: password, role: role })
      })
      .then(function (res) { return res.json(); })
      .then(function (data) {
        if (data && data.ok) {
          if (data.token) localStorage.setItem('workdesk_token', data.token);
          window.location.replace('/app/dashboard.html');
        } else {
          showToast(data && data.message ? data.message : 'Invalid credentials. Please try again.', true);
          onDone();
        }
      })
      .catch(function () {
        showToast('Login failed. Please check your connection and try again.', true);
        onDone();
      });
    });
  </script>

</body>
