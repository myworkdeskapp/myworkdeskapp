<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
  <title>myWORKDESK | Super Admin Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --primary:      #5A8F7B;
      --primary-dark: #497263;
      --primary-rgb:  90, 143, 123;
      --accent:       #F4C86A;
      --accent-dark:  #E6B84E;
      --danger:       #E74C3C;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #E8E4DE 0%, #CEC9C1 100%);
      -webkit-font-smoothing: antialiased;
      padding: 24px 16px;
    }

    /* ======= OUTER CARD ======= */
    .login-card {
      width: 940px;
      max-width: 100%;
      min-height: 600px;
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.14);
      display: flex;
      overflow: hidden;
    }

    /* ======= LEFT: FORM PANEL ======= */
    .form-panel {
      flex: 0 0 42%;
      display: flex;
      flex-direction: column;
      padding: 44px 48px 36px;
      background: #fff;
    }

    /* ── Logo pill ─────── */
    .logo-pill {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      border: 1.5px solid #D8D8D8;
      border-radius: 50px;
      padding: 7px 18px 7px 10px;
      align-self: flex-start;
      margin-bottom: 28px;
      text-decoration: none;
    }

    .logo-pill img {
      height: 26px;
      width: auto;
    }

    .logo-pill span {
      font-size: 13px;
      font-weight: 700;
      color: #1a2e28;
      letter-spacing: 0.01em;
    }

    /* ── SA restricted badge ─────── */
    .sa-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(90, 143, 123, 0.09);
      border: 1px solid rgba(90, 143, 123, 0.28);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 10.5px;
      font-weight: 700;
      color: var(--primary-dark);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 16px;
      align-self: flex-start;
    }

    /* ── Heading ─────── */
    .form-heading {
      font-size: 30px;
      font-weight: 700;
      color: #111827;
      line-height: 1.18;
      margin-bottom: 8px;
    }

    .form-sub {
      font-size: 13.5px;
      color: #9CA3AF;
      margin-bottom: 30px;
      line-height: 1.4;
    }

    /* ── Field groups ─────── */
    .field-group {
      margin-bottom: 18px;
    }

    .field-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #6B7280;
      margin-bottom: 7px;
    }

    .field-input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .field-input {
      width: 100%;
      height: 50px;
      padding: 0 16px;
      border: 1px solid #E5E7EB;
      border-radius: 14px;
      background: #FAFAFA;
      font-family: inherit;
      font-size: 14px;
      color: #111827;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .field-input::placeholder { color: #C4C4C4; }

    .field-input:focus {
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(var(--primary-rgb), 0.12);
    }

    .field-input.is-invalid { border-color: var(--danger); }

    /* ── Password / key eye toggle ─────── */
    .field-input.pwd-input { padding-right: 44px; }

    .pwd-eye {
      position: absolute;
      right: 13px;
      background: none;
      border: none;
      cursor: pointer;
      color: #9CA3AF;
      padding: 0;
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }

    .pwd-eye:hover { color: var(--primary-dark); }

    /* ── Field error ─────── */
    .field-error {
      font-size: 11px;
      color: var(--danger);
      margin-top: 5px;
      display: none;
      padding-left: 2px;
    }

    /* ── Submit button ─────── */
    .btn-submit {
      width: 100%;
      height: 52px;
      background: var(--accent);
      border: none;
      border-radius: 14px;
      color: #1a2e28;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
    }

    .btn-submit:hover {
      background: var(--accent-dark);
      box-shadow: 0 8px 22px rgba(230, 184, 78, 0.40);
      transform: translateY(-1px);
    }

    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.68; cursor: not-allowed; transform: none; }

    .h-spinner {
      display: none;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(26, 46, 40, 0.28);
      border-top-color: #1a2e28;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-submit.loading .h-spinner { display: block; }

    /* ── Bottom note ─────── */
    .bottom-note {
      margin-top: auto;
      font-size: 11.5px;
      color: #D1D5DB;
      text-align: center;
      line-height: 1.5;
    }

    /* ======= RIGHT: IMAGE PANEL ======= */
    .image-panel {
      flex: 1;
      position: relative;
      overflow: hidden;
      border-radius: 0 20px 20px 0;
    }

    .panel-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── Dark tint overlay over photo ─────── */
    .panel-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, rgba(26, 46, 40, 0.55) 0%, rgba(26, 46, 40, 0.20) 60%, transparent 100%);
      pointer-events: none;
    }

    /* ── SA label inside image panel ─────── */
    .panel-label {
      position: absolute;
      top: 28px;
      left: 24px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(26, 46, 40, 0.55);
      backdrop-filter: blur(10px) saturate(130%);
      -webkit-backdrop-filter: blur(10px) saturate(130%);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 10.5px;
      font-weight: 700;
      color: #F4C86A;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    /* ── Quote box (lower area of image) ─────── */
    .float-card-quote {
      position: absolute;
      bottom: 32px;
      left: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 14px;
      padding: 14px 18px;
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      border: 1px solid rgba(255, 255, 255, 0.25);
    }

    .quote-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin-bottom: 7px;
    }

    .quote-text {
      font-size: 12.5px;
      font-style: italic;
      color: #fff;
      line-height: 1.55;
      margin-bottom: 6px;
    }

    .quote-author {
      font-size: 11px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.72);
    }

    /* ======= TOAST ======= */
    .login-toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--primary);
      color: #fff;
      padding: 11px 22px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      z-index: 999;
      pointer-events: none;
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.35s;
      opacity: 0;
      white-space: nowrap;
    }

    .login-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .login-toast.error { background: #c0392b; }

    /* ======= RESPONSIVE ======= */
    @media (max-width: 720px) {
      body { padding: 0; align-items: stretch; }

      .login-card {
        flex-direction: column;
        border-radius: 0;
        min-height: 100vh;
        box-shadow: none;
      }

      .form-panel {
        flex: none;
        padding: 36px 28px 32px;
        order: 1;
      }

      .image-panel {
        flex: none;
        height: 200px;
        border-radius: 0;
        order: 0;
      }

      .float-card-quote { display: none; }
      .panel-label { top: 16px; left: 16px; }
    }

    @media (max-width: 900px) and (min-width: 721px) {
      .form-panel { padding: 36px 36px 28px; }
    }

  </style>
</head>
<body>

  <!-- ── OUTER CARD ─────── -->
  <div class="login-card">

    <!-- ── LEFT: form panel ─────── -->
    <div class="form-panel">

      <!-- Logo pill -->
      <a class="logo-pill" href="/" aria-label="myWORKDESK home">
        <img src="/assets/workdesk-logo.svg" alt="myWORKDESK" />
        <span>myWORKDESK</span>
      </a>

      <!-- Restricted access badge -->
      <div class="sa-badge">
        <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 1.5l8.25 3v6.75A9.75 9.75 0 0112 22.5 9.75 9.75 0 013.75 11.25V4.5L12 1.5z"/>
        </svg>
        Super Admin — Restricted Access
      </div>

      <!-- Heading -->
      <h1 class="form-heading">Super Admin Sign In</h1>
      <p class="form-sub">Authorized super administrators only. All access is monitored and logged.</p>

      <!-- Form -->
      <form id="saLoginForm" novalidate>

        <!-- Username -->
        <div class="field-group">
          <label class="field-label" for="saUsername">Username</label>
          <div class="field-input-wrap">
            <input
              type="text"
              id="saUsername"
              name="username"
              class="field-input"
              placeholder="Super admin username"
              autocomplete="off"
              required
            />
          </div>
          <span class="field-error" id="saUsernameError">Required</span>
        </div>

        <!-- Password -->
        <div class="field-group">
          <label class="field-label" for="saPassword">Password</label>
          <div class="field-input-wrap">
            <input
              type="password"
              id="saPassword"
              name="password"
              class="field-input pwd-input"
              placeholder="••••••••••••"
              autocomplete="current-password"
              required
            />
            <button type="button" class="pwd-eye" id="eyeTogglePwd" aria-label="Toggle password visibility">
              <svg id="eyeIconPwd" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="17" height="17">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
          <span class="field-error" id="saPasswordError">Required</span>
        </div>

        <!-- Secret Key -->
        <div class="field-group">
          <label class="field-label" for="saSecretKey">Security Key</label>
          <div class="field-input-wrap">
            <input
              type="password"
              id="saSecretKey"
              name="secretKey"
              class="field-input pwd-input"
              placeholder="••••••••••••"
              autocomplete="off"
              required
            />
            <button type="button" class="pwd-eye" id="eyeToggleKey" aria-label="Toggle security key visibility">
              <svg id="eyeIconKey" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="17" height="17">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
          <span class="field-error" id="saSecretKeyError">Required</span>
        </div>

        <!-- Sign In button -->
        <button type="submit" class="btn-submit" id="loginBtn">
          <span class="btn-label">Sign In</span>
          <span class="h-spinner" aria-hidden="true"></span>
        </button>

      </form>

      <!-- Bottom note -->
      <div class="bottom-note">This portal is not linked from any public page.<br>Unauthorized access attempts will be reported.</div>

    </div>

    <!-- ── RIGHT: image panel ─────── -->
    <div class="image-panel">
      <img class="panel-photo" src="/assets/login-cover-happy.png" alt="Workspace" />
      <div class="panel-overlay"></div>

      <!-- SA restricted label -->
      <div class="panel-label" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 1.5l8.25 3v6.75A9.75 9.75 0 0112 22.5 9.75 9.75 0 013.75 11.25V4.5L12 1.5z"/>
        </svg>
        Super Admin Portal
      </div>

      <!-- Motivational quote -->
      <div class="float-card-quote" aria-hidden="true">
        <div class="quote-label">&#x275D; Daily Motivation</div>
        <p class="quote-text" id="quoteText"></p>
        <span class="quote-author" id="quoteAuthor"></span>
      </div>
    </div>

  </div><!-- /.login-card -->

  <!-- Toast notification -->
  <div class="login-toast" id="loginToast" role="alert" aria-live="assertive"></div>

  <script>
    /* ── 30 daily-rotating motivational quotes ─────────────────────────── */
    var QUOTES = [
      { text: 'Hard work beats talent when talent doesn\u2019t work hard.', author: 'Tim Notke' },
      { text: 'Success is not final, failure is not fatal: it is the courage to continue that counts.', author: 'Winston Churchill' },
      { text: 'The only way to do great work is to love what you do.', author: 'Steve Jobs' },
      { text: 'Don\u2019t watch the clock; do what it does. Keep going.', author: 'Sam Levenson' },
      { text: 'Success usually comes to those who are too busy to be looking for it.', author: 'Henry David Thoreau' },
      { text: 'Opportunities don\u2019t happen. You create them.', author: 'Chris Grosser' },
      { text: 'I find that the harder I work, the more luck I seem to have.', author: 'Thomas Jefferson' },
      { text: 'The secret of getting ahead is getting started.', author: 'Mark Twain' },
      { text: 'It always seems impossible until it\u2019s done.', author: 'Nelson Mandela' },
      { text: 'Don\u2019t limit your challenges. Challenge your limits.', author: 'Jerry Dunn' },
      { text: 'The way to get started is to quit talking and begin doing.', author: 'Walt Disney' },
      { text: 'Dream big, work hard, stay focused, and surround yourself with good people.', author: 'Unknown' },
      { text: 'Hustle until your haters ask if you\u2019re hiring.', author: 'Unknown' },
      { text: 'A dream doesn\u2019t become reality through magic; it takes sweat, determination, and hard work.', author: 'Colin Powell' },
      { text: 'Push yourself, because no one else is going to do it for you.', author: 'Unknown' },
      { text: 'Great things never come from comfort zones.', author: 'Unknown' },
      { text: 'Wake up with determination. Go to bed with satisfaction.', author: 'Unknown' },
      { text: 'The harder you work for something, the greater you\u2019ll feel when you achieve it.', author: 'Unknown' },
      { text: 'Build your dream, or someone else will hire you to build theirs.', author: 'Tony Gaskins' },
      { text: 'Success is not overnight. It\u2019s when every day you get a little better than the day before.', author: 'Dwayne Johnson' },
      { text: 'The only place where success comes before work is in the dictionary.', author: 'Vidal Sassoon' },
      { text: 'Do what you have to do until you can do what you want to do.', author: 'Oprah Winfrey' },
      { text: 'You don\u2019t have to be great to start, but you have to start to be great.', author: 'Zig Ziglar' },
      { text: 'Believe you can and you\u2019re halfway there.', author: 'Theodore Roosevelt' },
      { text: 'It does not matter how slowly you go as long as you do not stop.', author: 'Confucius' },
      { text: 'The difference between ordinary and extraordinary is that little extra.', author: 'Jimmy Johnson' },
      { text: 'Motivation is what gets you started. Habit is what keeps you going.', author: 'Jim Ryun' },
      { text: 'If you are not willing to risk the usual, you will have to settle for the ordinary.', author: 'Jim Rohn' },
      { text: 'The man who moves a mountain begins by carrying away small stones.', author: 'Confucius' },
      { text: 'Your time is limited, so don\u2019t waste it living someone else\u2019s life.', author: 'Steve Jobs' }
    ];

    /* Pick quote by day-of-year so it changes each calendar day */
    (function () {
      var now   = new Date();
      var start = new Date(now.getFullYear(), 0, 1);
      var dayOfYear = Math.floor((now - start) / (1000 * 60 * 60 * 24));
      var q = QUOTES[dayOfYear % QUOTES.length];
      document.getElementById('quoteText').textContent   = '\u201c' + q.text + '\u201d';
      document.getElementById('quoteAuthor').textContent = '\u2014 ' + q.author;
    }());

    /* ── Toast helper ──────────────────────────────────────────────────── */
    function showToast(msg, isError, duration) {
      var toast = document.getElementById('loginToast');
      toast.textContent = msg;
      toast.classList.toggle('error', !!isError);
      toast.classList.add('show');
      setTimeout(function () { toast.classList.remove('show'); }, duration || 3500);
    }

    /* ── Field error helpers ───────────────────────────────────────────── */
    function setFieldError(inputId, errorId, message) {
      var input = document.getElementById(inputId);
      var err   = document.getElementById(errorId);
      if (!input || !err) return;
      if (message) {
        input.classList.add('is-invalid');
        err.textContent   = message;
        err.style.display = 'block';
      } else {
        input.classList.remove('is-invalid');
        err.style.display = 'none';
      }
    }

    function clearFieldErrors() {
      setFieldError('saUsername',  'saUsernameError',  null);
      setFieldError('saPassword',  'saPasswordError',  null);
      setFieldError('saSecretKey', 'saSecretKeyError', null);
    }

    ['saUsername', 'saPassword', 'saSecretKey'].forEach(function (id) {
      var el = document.getElementById(id);
      if (el) el.addEventListener('input', function () { setFieldError(id, id + 'Error', null); });
    });

    /* ── Eye toggle helper ─────────────────────────────────────────────── */
    function makeEyeToggle(btnId, inputId, iconId) {
      var btn = document.getElementById(btnId);
      if (!btn) return;
      btn.addEventListener('click', function () {
        var input = document.getElementById(inputId);
        var icon  = document.getElementById(iconId);
        if (input.type === 'password') {
          input.type = 'text';
          icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>';
        } else {
          input.type = 'password';
          icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
        }
      });
    }

    makeEyeToggle('eyeTogglePwd', 'saPassword',  'eyeIconPwd');
    makeEyeToggle('eyeToggleKey', 'saSecretKey', 'eyeIconKey');

    /* ── Rate limiting (client-side guard) ─────────────────────────────── */
    var failCount  = 0;
    var lockedUntil = 0;

    /* ── Form submission ───────────────────────────────────────────────── */
    document.getElementById('saLoginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      clearFieldErrors();

      if (Date.now() < lockedUntil) {
        var secs = Math.ceil((lockedUntil - Date.now()) / 1000);
        showToast('Too many failed attempts. Try again in ' + secs + 's.', true);
        return;
      }

      var btn       = document.getElementById('loginBtn');
      var username  = document.getElementById('saUsername').value.trim();
      var password  = document.getElementById('saPassword').value;
      var secretKey = document.getElementById('saSecretKey').value;
      var valid     = true;

      if (!username)  { setFieldError('saUsername',  'saUsernameError',  'Required'); valid = false; }
      if (!password)  { setFieldError('saPassword',  'saPasswordError',  'Required'); valid = false; }
      if (!secretKey) { setFieldError('saSecretKey', 'saSecretKeyError', 'Required'); valid = false; }
      if (!valid) return;

      var btnLabel = btn.querySelector('.btn-label');
      if (btnLabel) btnLabel.textContent = 'Authenticating\u2026';
      btn.classList.add('loading');
      btn.disabled = true;

      fetch('/api/sa-auth', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ username: username, password: password, securityKey: secretKey })
      })
      .then(function (res) { return res.json().then(function (d) { return { status: res.status, data: d }; }); })
      .then(function (result) {
        if (result.data && result.data.ok) {
          failCount = 0;
          localStorage.setItem('sa_token', result.data.token);
          localStorage.setItem('sa_session', JSON.stringify({
            token:       result.data.token,
            username:    result.data.username,
            role:        'super_admin',
            permissions: ['*'],
            issuedAt:    Date.now()
          }));
          window.location.href = 'sa-dashboard.html';
        } else {
          // 503 means SA secrets are not configured in Cloudflare environment
          if (result.status === 503) {
            showToast('Super admin access is not configured. Re-add SA_USERNAME, SA_SECURITY_KEY and SA_PASSWORD in Cloudflare → Settings → Environment variables, then redeploy.', true, 10000);
            if (btnLabel) btnLabel.textContent = 'Sign In';
            btn.classList.remove('loading');
            btn.disabled = false;
            return;
          }
          failCount++;
          if (failCount >= 5) {
            lockedUntil = Date.now() + 60000;
            showToast('Too many failed attempts. Locked for 60 seconds.', true, 8000);
          } else {
            showToast(result.data && result.data.message ? result.data.message : 'Invalid credentials. Access denied.', true);
          }
          if (btnLabel) btnLabel.textContent = 'Sign In';
          btn.classList.remove('loading');
          btn.disabled = false;
        }
      })
      .catch(function () {
        showToast('Network error. Please try again.', true);
        if (btnLabel) btnLabel.textContent = 'Sign In';
        btn.classList.remove('loading');
        btn.disabled = false;
      });
    });
  </script>

</body>
</html>
