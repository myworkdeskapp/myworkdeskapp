# WorkDesk — Super Admin Panel
# Cloudflare Pages + Workers Configuration
#
# This is a SEPARATE Cloudflare Pages project from the main WorkDesk app.
# Deploy this folder as its own project on a separate web address.
#
# See DEPLOY.md in this folder for full step-by-step deployment instructions.
# Docs: https://developers.cloudflare.com/pages/

name = "workdesk-super-admin"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# ── Static Assets ─────────────────────────────────────────────
# Serves sa-portal.html, sa-dashboard.html, and the background image
# as-is from Cloudflare's global CDN.
[assets]
directory = "."
# Drop the .html extension from URLs automatically
html_handling = "auto-trailing-slash"
# Redirect unknown routes back to the portal login page
not_found_handling = "single-page-application"

# ── Pages (static site) ───────────────────────────────────────
# Framework preset: None
# Build command:    (leave empty — zero-build static site)
# Build output dir: super-admin/
# Root directory:   super-admin/

# ── Workers API routes ────────────────────────────────────────
# Cloudflare Pages Functions live in functions/api/*.js
#
#   functions/api/sa-auth.js       → POST/GET /api/sa-auth
#   functions/api/sa-org-admins.js → GET/POST/PUT/DELETE /api/sa-org-admins
#
# POST /api/sa-auth        — Authenticate with username + security key + password
# GET  /api/sa-auth        — Verify an existing super admin session token
# GET  /api/sa-org-admins  — List all org admins          (SA auth required)
# POST /api/sa-org-admins  — Create a new org admin       (SA auth required)
# PUT  /api/sa-org-admins  — Update an org admin          (SA auth required)
# DELETE /api/sa-org-admins — Remove an org admin         (SA auth required)

# ── KV Namespaces (optional) ──────────────────────────────────
# SA_SESSIONS: persists super admin session tokens server-side.
# Without this, tokens are verified client-side only (less secure).
#
# Setup:
#   wrangler kv:namespace create "SA_SESSIONS" --namespace-id <project-name>
#
# Then uncomment and fill in the id below:
#
# [[kv_namespaces]]
# binding = "SA_SESSIONS"
# id     = "YOUR_SA_SESSIONS_KV_ID"

# ── Environment variables ─────────────────────────────────────
# NEVER commit real credentials here.
# Set all three secrets in the Cloudflare Pages dashboard
# (Settings → Environment Variables → Add variable → Encrypt) or via CLI:
#
#   wrangler secret put SA_USERNAME     --project-name workdesk-super-admin
#   wrangler secret put SA_SECURITY_KEY --project-name workdesk-super-admin
#   wrangler secret put SA_PASSWORD     --project-name workdesk-super-admin
